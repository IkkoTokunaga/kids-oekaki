services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "3000:3000"
    command: >
      sh -lc "if [ ! -x node_modules/.bin/next ]; then npm ci; fi && exec npm run dev"
    environment:
      - WATCHPACK_POLLING=true
