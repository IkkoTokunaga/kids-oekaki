services:
  hotreload:
    image: node:20-alpine
    working_dir: /workspace
    environment:
      - CHOKIDAR_USEPOLLING=1
      - CHOKIDAR_INTERVAL=300
    volumes:
      - .:/workspace
    command: >
      sh -lc "npx --yes browser-sync start
      --server games
      --files 'games/**/*'
      --port 3001
      --host 0.0.0.0
      --no-ui
      --no-open"
    ports:
      - "3001:3001"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "3000:3000"
    tty: true

  web:
    image: nginx:alpine
    volumes:
      - ./:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
