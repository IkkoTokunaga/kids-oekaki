<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>おえかき ひろば</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg1: #ffe0b2;
      --bg2: #ffcc80;
      --panel: rgba(255, 255, 255, 0.96);
      --ink: #263238;
      --shadow: rgba(38, 50, 56, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      min-height: 100dvh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(120% 80% at 50% -20%, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 56%),
        linear-gradient(160deg, #0f1f4d 0%, #2454ad 32%, #1eb9d4 56%, #2dc57a 100%);
      background-size: 100% 100%, 180% 180%;
      animation:
        oekakiSkyShift 16s ease-in-out infinite alternate,
        dayNightFilter 300s linear infinite;
      padding:
        env(safe-area-inset-top, 0)
        env(safe-area-inset-right, 0)
        max(0.45rem, env(safe-area-inset-bottom, 0))
        env(safe-area-inset-left, 0);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -10%;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 25%, rgba(255,255,255,0.2) 0 3px, transparent 4px),
        radial-gradient(circle at 74% 34%, rgba(255,255,255,0.2) 0 2px, transparent 3px),
        radial-gradient(circle at 48% 78%, rgba(255,255,255,0.18) 0 2px, transparent 3px);
      background-size: 340px 340px, 280px 280px, 400px 400px;
      opacity: 0.62;
      animation: oekakiSparkleMove 24s linear infinite;
    }

    @keyframes oekakiSkyShift {
      0% { background-position: 0 0, 0% 38%; }
      100% { background-position: 0 0, 100% 62%; }
    }

    @keyframes dayNightFilter {
      0%, 20% { filter: brightness(1) saturate(1); }
      45% { filter: brightness(0.88) saturate(1.05); }
      55% { filter: brightness(0.62) saturate(0.85); }
      80% { filter: brightness(0.88) saturate(1.02); }
      100% { filter: brightness(1) saturate(1); }
    }

    @keyframes oekakiSparkleMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-38px, -24px); }
    }

    .header {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
      padding: 0.22rem 0.55rem 0.12rem;
      text-align: center;
    }

    h1 {
      margin: 0 auto;
      min-height: 2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.98rem, 3.8vw, 1.18rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.01em;
      text-shadow: none;
    }

    .hint {
      margin: 0.04rem 0 0;
      font-size: clamp(0.68rem, 2.3vw, 0.76rem);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.86);
    }

    .toolbar {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
      margin: 0 0.45rem 0.3rem;
      padding: 0.42rem 0.4rem 0.45rem;
      background: var(--panel);
      border-radius: 1.1rem;
      box-shadow: 0 4px 18px var(--shadow);
      border: 3px solid #ffb74d;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
    }

    .menu-btn {
      min-height: 2.1rem;
      padding: 0 0.8rem;
      border: 3px solid #ffb74d;
      border-radius: 0.55rem;
      background: #fff8e1;
      color: #5d4037;
      font-size: clamp(0.75rem, 2.8vw, 0.9rem);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 3px 0 #fb8c00;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .color-chip {
      width: 1rem;
      height: 1rem;
      border-radius: 999px;
      border: 2px solid rgba(0, 0, 0, 0.25);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55);
      display: inline-block;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .color-chip.eraser {
      background: linear-gradient(135deg, #eceff1 45%, #b0bec5 45%, #b0bec5 55%, #eceff1 55%);
    }

    .menu-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #fb8c00;
    }

    .popup {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      z-index: 30;
      background: rgba(20, 18, 16, 0.42);
    }

    .popup.on {
      display: flex;
    }

    .popup-card {
      width: min(840px, 96vw);
      max-width: 840px;
      min-width: min(320px, 96vw);
      max-height: 84dvh;
      background: #fffef8;
      border: 3px solid #ffb74d;
      border-radius: 1rem;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.26);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .popup-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
      padding: 0.5rem 0.7rem;
      background: #fff3e0;
      border-bottom: 2px solid #ffcc80;
    }

    .popup-title {
      margin: 0;
      font-size: clamp(0.82rem, 3vw, 1rem);
      color: #6d4c41;
      font-weight: 900;
    }

    .popup-close {
      min-height: 1.9rem;
      padding: 0 0.55rem;
      border-radius: 0.55rem;
      border: 2px solid #ef9a9a;
      background: #ffcdd2;
      color: #b71c1c;
      font-weight: 900;
      cursor: pointer;
    }

    .popup-body {
      padding: 0.55rem;
      overflow: auto;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 0.45rem;
    }

    .swatch,
    .swatch-fill {
      width: 2.15rem;
      height: 2.15rem;
      border-radius: 50%;
      border: 4px solid rgba(0, 0, 0, 0.12);
      cursor: pointer;
      padding: 0;
      box-shadow: 0 3px 0 rgba(0, 0, 0, 0.15);
      transition: transform 0.1s ease;
    }

    .swatch:active,
    .swatch-fill:active {
      transform: scale(0.92);
    }

    .swatch.on,
    .swatch-fill.on {
      outline: 4px solid #ff6f00;
      outline-offset: 2px;
      transform: scale(1.08);
    }

    .swatch[data-c="eraser"],
    .swatch-fill[data-c="eraser"] {
      background: linear-gradient(135deg, #eceff1 45%, #b0bec5 45%, #b0bec5 55%, #eceff1 55%);
    }

    .swatch[data-c="rainbow"],
    .swatch-fill[data-c="rainbow"] {
      background: conic-gradient(
        #ff1744 0deg,
        #ff9100 60deg,
        #ffea00 120deg,
        #00e676 180deg,
        #00b0ff 240deg,
        #7c4dff 300deg,
        #ff1744 360deg
      );
    }

    .size-btn {
      min-height: 2.05rem;
      padding: 0.22rem 0.55rem;
      font-size: clamp(0.74rem, 2.8vw, 0.88rem);
      font-weight: 800;
      border: 3px solid #8d6e63;
      border-radius: 0.55rem;
      background: #d7ccc8;
      color: #3e2723;
      cursor: pointer;
      box-shadow: 0 3px 0 #6d4c41;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
    }

    .size-btn.on {
      background: #ffcc80;
      border-color: #ef6c00;
      color: #bf360c;
    }

    .size-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #6d4c41;
    }

    .size-label {
      line-height: 1;
      white-space: nowrap;
    }

    .touch-sample {
      width: 1.35rem;
      height: 0.5rem;
      border-radius: 999px;
      background: #5d4037;
      border: 1px solid rgba(0, 0, 0, 0.18);
      display: inline-block;
      flex-shrink: 0;
    }

    .touch-sample.pencil {
      height: 0.18rem;
      opacity: 0.88;
    }

    .touch-sample.pen {
      height: 0.3rem;
    }

    .touch-sample.brush {
      height: 0.5rem;
      opacity: 0.72;
    }

    .touch-sample.crayon {
      height: 0.56rem;
      background: repeating-linear-gradient(90deg, #6d4c41 0 3px, #8d6e63 3px 6px);
    }

    .touch-sample.spray {
      width: 1.4rem;
      height: 0.6rem;
      border-radius: 0.4rem;
      background:
        radial-gradient(circle at 18% 50%, #5d4037 0 2px, transparent 3px),
        radial-gradient(circle at 44% 38%, #5d4037 0 2px, transparent 3px),
        radial-gradient(circle at 68% 55%, #5d4037 0 2px, transparent 3px),
        radial-gradient(circle at 84% 40%, #5d4037 0 2px, transparent 3px);
      border: 0;
    }

    .touch-sample.marker {
      height: 0.45rem;
      border-radius: 0.2rem;
      opacity: 0.62;
    }

    .touch-sample.neon {
      height: 0.36rem;
      background: #00e5ff;
      box-shadow: 0 0 4px rgba(0, 229, 255, 0.8);
    }

    .touch-sample.chalk {
      height: 0.5rem;
      background: repeating-linear-gradient(90deg, #78909c 0 2px, #b0bec5 2px 4px);
      opacity: 0.8;
    }

    .action-btn {
      min-height: 2.15rem;
      padding: 0 0.62rem;
      font-size: clamp(0.74rem, 2.8vw, 0.88rem);
      font-weight: 800;
      border-radius: 0.5rem;
      cursor: pointer;
      border: 3px solid;
    }

    .action-clear {
      background: #ffcdd2;
      border-color: #e57373;
      color: #b71c1c;
      box-shadow: 0 3px 0 #c62828;
    }

    .action-chaos {
      background: linear-gradient(135deg, #ff1744 0%, #ffea00 45%, #00e5ff 100%);
      border-color: #6a1b9a;
      color: #3e103f;
      box-shadow: 0 3px 0 #4a148c;
    }

    .action-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #666;
    }

    .canvas-shell {
      position: relative;
      z-index: 1;
      flex: 1;
      min-height: 0;
      margin: 0 0 0.35rem;
      display: flex;
      flex-direction: column;
    }

    .canvas-frame {
      flex: 1;
      min-height: 220px;
      background: #fff;
      border-radius: 1rem;
      box-shadow:
        inset 0 0 0 4px #ffe0b2,
        0 6px 24px var(--shadow);
      overflow: hidden;
      touch-action: none;
      position: relative;
    }

    #bgCanvas,
    #drawCanvas {
      display: block;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #drawCanvas {
      cursor: crosshair;
    }

    .stamp-btn {
      min-height: auto;
      padding: 0.1rem 0.15rem;
      border-radius: 0.45rem;
      border: 0;
      background: transparent;
      color: #263238;
      font-size: clamp(1.35rem, 4.8vw, 1.8rem);
      font-weight: 800;
      cursor: pointer;
      line-height: 1;
    }

    .stamp-btn.on {
      background: rgba(255, 213, 79, 0.28);
      transform: scale(1.08);
    }

    .stamp-btn:active {
      transform: scale(0.95);
    }

    .stamp-accordion {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.2rem;
    }

    .stamp-tabs {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.35rem;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 0.35rem;
      margin-bottom: 0.25rem;
      border-bottom: 2px solid #e0e0e0;
      width: 100%;
    }

    .stamp-tab {
      flex: 0 0 auto;
      padding: 0.3rem 0.55rem;
      border-radius: 0.5rem;
      border: 2px solid #b0bec5;
      background: #eceff1;
      color: #37474f;
      font-size: clamp(0.68rem, 2.5vw, 0.8rem);
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .stamp-tab.on {
      border-color: #42a5f5;
      background: #e3f2fd;
      color: #0d47a1;
      box-shadow: 0 2px 0 #42a5f5;
    }

    .stamp-panels {
      width: 100%;
      min-height: 4rem;
    }

    .stamp-panel {
      display: none;
      flex-wrap: wrap;
      gap: 0.28rem;
      align-content: flex-start;
      max-height: min(52vh, 22rem);
      overflow-y: auto;
      overflow-x: hidden;
    }

    .stamp-panel.on {
      display: flex;
    }

    .template-btn {
      min-height: 2.05rem;
      padding: 0 0.56rem;
      border-radius: 0.55rem;
      border: 3px solid #90caf9;
      background: #e3f2fd;
      color: #0d47a1;
      font-size: clamp(0.72rem, 2.7vw, 0.86rem);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 3px 0 #42a5f5;
    }

    .template-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #42a5f5;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.45rem;
      width: 100%;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>おえかき ひろば</h1>
    <p class="hint">ゆびや マウスで なぞってね</p>
  </header>

  <div class="toolbar" role="toolbar" aria-label="どうぐ">
    <button type="button" class="menu-btn" data-popup-open="popupColors" id="btnColors">🎨 せん: くろ</button>
    <button type="button" class="menu-btn" data-popup-open="popupFillColors" id="btnFill">🪣 ぬる: くろ</button>
    <button type="button" class="menu-btn" data-popup-open="popupSizes" id="btnSizes">🖌️ タッチ: ペン</button>
    <button type="button" class="action-btn action-clear" id="btnClear">ぜんぶ けす</button>
    <button type="button" class="action-btn action-chaos" id="btnYaminabe">やみなべ</button>
    <button type="button" class="menu-btn" data-popup-open="popupTemplates" id="btnTemplates">🖼️ テンプレート: なし</button>
    <button type="button" class="menu-btn" data-popup-open="popupStamps" id="btnStamps">✨ スタンプ: なし</button>
  </div>

  <script>
    (function () {
      "use strict";

      var bgCanvas = document.getElementById("bgCanvas");
      var bgCtx = bgCanvas.getContext("2d");
      var canvas = document.getElementById("drawCanvas");
      var ctx = canvas.getContext("2d");
      var frame = canvas.parentElement;

      var color = "#212121";
      var lineW = 10;

      var drawing = false;
      var last = null;
      var eraser = false;
      var rainbowInk = false;
      var fillColor = "#212121";

      var tapMaybe = false;
      var fillBucketCursor = false;
      var activeStamp = "";

      var lastFrameW = 0;
      var lastFrameH = 0;

      var SVG_CURSOR_PEN =
        '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">' +
        '<path fill="#000" opacity="0.2" d="M8 30L22 15l2.8 2.9L12 31z"/>' +
        '<path fill="#cfd8dc" stroke="#37474f" stroke-width="1" stroke-linejoin="round" d="M6 31L19 16l3.5 3.2L10 31z"/>' +
        '<path fill="#eceff1" d="M19 16L19.8 15.2 23.2 18.5 22.5 19.2z"/>' +
        '<circle cx="8" cy="29" r="2.4" fill="#111" stroke="#fff" stroke-width="0.75"/>' +
        '<path fill="#e53935" stroke="#fff" stroke-width="1" stroke-linejoin="round" d="M19 16L30 5l3 3L22.5 19.2z"/>' +
        '<path fill="#ffcdd2" opacity="0.9" d="M22 12l7-7 1.2 1.2-7 7z"/>' +
        '<path fill="#b71c1c" stroke="#fff" stroke-width="0.7" stroke-linejoin="round" d="M30 5l2-2 2.2 2.2L33 8z"/>' +
        "</svg>";
      var SVG_CURSOR_BUCKET =
        '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">' +
        '<path fill="#5c6bc0" stroke="#fff" stroke-width="1" d="M7 9h18v2.5L22.5 25H9.5L7 11.5z"/>' +
        '<ellipse fill="#3949ab" cx="16" cy="9" rx="10" ry="2.8"/>' +
        '<path fill="#ef5350" d="M6 11c-2.5 4-2 9-1 11"/>' +
        "</svg>";
      function cursorFromSvgMarkup(markup, hx, hy) {
        return (
          'url("data:image/svg+xml;charset=utf-8,' +
          encodeURIComponent(markup) +
          '") ' +
          hx +
          " " +
          hy +
          ", crosshair"
        );
      }
      var CURSOR_PEN = cursorFromSvgMarkup(SVG_CURSOR_PEN, 8, 29);
      var CURSOR_BUCKET = cursorFromSvgMarkup(SVG_CURSOR_BUCKET, 6, 12);

      function refreshCanvasCursor() {
        if (!canvas) return;
        if (activeStamp) {
          canvas.style.cursor = "pointer";
          return;
        }
        if (fillBucketCursor) {
          canvas.style.cursor = CURSOR_BUCKET;
          return;
        }
        canvas.style.cursor = CURSOR_PEN;
      }

      var colorNames = {
        "#e53935": "あか",
        "#fb8c00": "オレンジ",

        "#212121": "くろ",
        "eraser": "けしゴム"
      };
      var brushNames = {
        pencil: "えんぴつ",
        pen: "ペン",
        brush: "ふで",
        crayon: "クレヨン",
        spray: "スプレー",
        marker: "マーカー",

        chalk: "チョーク"
      };
      var templateNames = {

        city: "まちなみ",
        sea: "うみ",
        space: "うちゅう",

      };
      function syncStampBtnHighlight() {
        document.querySelectorAll(".stamp-btn").forEach(function (s) {
          s.classList.toggle("on", !!activeStamp && s.getAttribute("data-stamp") === activeStamp);
        });
      }

      function setStampTab(tabId) {
        document.querySelectorAll(".stamp-tab").forEach(function (t) {
          var on = t.getAttribute("data-stamp-tab") === tabId;
          t.classList.toggle("on", on);
          t.setAttribute("aria-selected", on ? "true" : "false");
        });
        document.querySelectorAll(".stamp-panel").forEach(function (p) {
          var on = p.getAttribute("data-stamp-panel") === tabId;
          p.classList.toggle("on", on);
          p.hidden = !on;
        });
      }

      function buildStampUI(tabs) {
        var root = document.getElementById("stampAccordion");
        root.innerHTML = "";
        var tabRow = document.createElement("div");
        tabRow.className = "stamp-tabs";
        tabRow.setAttribute("role", "tablist");
        tabRow.setAttribute("aria-label", "スタンプの しゅるい");

        var panels = document.createElement("div");
        panels.className = "stamp-panels";

        tabs.forEach(function (tab, idx) {
          var tbtn = document.createElement("button");
          tbtn.type = "button";
          tbtn.className = "stamp-tab" + (idx === 0 ? " on" : "");
          tbtn.setAttribute("role", "tab");
          tbtn.setAttribute("aria-selected", idx === 0 ? "true" : "false");
          tbtn.setAttribute("data-stamp-tab", tab.id);
          tbtn.setAttribute("id", "stamp-tab-" + tab.id);
          tbtn.textContent = tab.label;

          var panel = document.createElement("div");
          panel.className = "stamp-panel" + (idx === 0 ? " on" : "");
          panel.setAttribute("role", "tabpanel");
          panel.setAttribute("aria-labelledby", "stamp-tab-" + tab.id);
          panel.setAttribute("data-stamp-panel", tab.id);
          panel.hidden = idx !== 0;

          tab.stamps.forEach(function (emj) {
            var b = document.createElement("button");
            b.type = "button";
            b.className = "stamp-btn";
            b.setAttribute("data-stamp", emj);
            b.textContent = emj;
            panel.appendChild(b);
          });

          tabRow.appendChild(tbtn);
          panels.appendChild(panel);
        });

        root.appendChild(tabRow);
        root.appendChild(panels);
        syncStampBtnHighlight();
      }

      function stampsJsonUrl() {
        return "/oekaki-stamps.json";
      }

      function applyStrokeStyle() {
        if (eraser) {
          ctx.globalCompositeOperation = "destination-out";
          ctx.strokeStyle = "rgba(0,0,0,1)";
          ctx.lineWidth = lineW * 1.85;
          ctx.globalAlpha = 1;
        } else {
          ctx.globalCompositeOperation = "source-over";
          ctx.strokeStyle = rainbowInk ? "hsl(" + Math.floor(Date.now() / 18 % 360) + " 100% 50%)" : color;
          ctx.lineWidth = lineW;
          ctx.globalAlpha = 1;
          if (brushKind === "pencil") {
            ctx.lineWidth = Math.max(2, lineW * 0.68);
            ctx.globalAlpha = 0.9;
          } else if (brushKind === "brush") {
            ctx.lineWidth = lineW * 1.35;
            ctx.globalAlpha = 0.72;
          } else if (brushKind === "crayon") {
            ctx.lineWidth = lineW * 1.55;
            ctx.globalAlpha = 0.58;
          } else if (brushKind === "marker") {
            ctx.lineWidth = lineW * 1.25;
            ctx.globalAlpha = 0.5;
            ctx.lineCap = "butt";
            ctx.lineJoin = "round";
          } else if (brushKind === "neon") {
            ctx.lineWidth = lineW * 0.95;
            ctx.globalAlpha = 0.95;
            ctx.shadowColor = rainbowInk ? ctx.strokeStyle : color;
            ctx.shadowBlur = Math.max(3, lineW * 0.9);
          } else if (brushKind === "chalk") {
            ctx.lineWidth = lineW * 1.45;
            ctx.globalAlpha = 0.68;
          }
        }
        if (brushKind !== "marker") {
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
        }
      }

      function sprayAt(point) {
        var radius = lineW * 1.15;
        var count = Math.floor(lineW * 2.8);
        ctx.save();
        ctx.globalCompositeOperation = eraser ? "destination-out" : "source-over";
        ctx.fillStyle = eraser ? "rgba(0,0,0,1)" : (rainbowInk ? "hsl(" + Math.floor(Date.now() / 18 % 360) + " 100% 50%)" : color);
        ctx.globalAlpha = eraser ? 1 : 0.56;
        for (var i = 0; i < count; i += 1) {
          var ang = Math.random() * Math.PI * 2;
          var dist = Math.sqrt(Math.random()) * radius;
          var dot = Math.random() * 1.1 + 0.45;
          ctx.beginPath();
          ctx.arc(point.x + Math.cos(ang) * dist, point.y + Math.sin(ang) * dist, dot, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function syncSize() {
        var dpr = window.devicePixelRatio || 1;
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        if (w < 10 || h < 10) return;
        if (w === lastFrameW && h === lastFrameH && canvas.width > 0) return;

        var prevW = lastFrameW;
        var prevH = lastFrameH;
        var keepPaint =
          prevW > 0 &&
          prevH > 0 &&
          canvas.width > 0 &&
          canvas.height > 0 &&
          bgCanvas.width > 0 &&
          bgCanvas.height > 0;
        var resizeSnapshotDraw = null;
        var resizeSnapshotBg = null;
        if (keepPaint) {
          resizeSnapshotDraw = document.createElement("canvas");
          resizeSnapshotDraw.width = canvas.width;
          resizeSnapshotDraw.height = canvas.height;
          resizeSnapshotDraw.getContext("2d").drawImage(canvas, 0, 0);

          resizeSnapshotBg = document.createElement("canvas");
          resizeSnapshotBg.width = bgCanvas.width;
          resizeSnapshotBg.height = bgCanvas.height;
          resizeSnapshotBg.getContext("2d").drawImage(bgCanvas, 0, 0);
        }

        lastFrameW = w;
        lastFrameH = h;
        bgCanvas.width = Math.floor(w * dpr);
        bgCanvas.height = Math.floor(h * dpr);
        bgCanvas.style.width = w + "px";
        bgCanvas.style.height = h + "px";
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";

        bgCtx.setTransform(1, 0, 0, 1, 0, 0);
        bgCtx.scale(dpr, dpr);
        if (resizeSnapshotBg) {
          bgCtx.drawImage(resizeSnapshotBg, 0, 0, resizeSnapshotBg.width, resizeSnapshotBg.height, 0, 0, w, h);
        } else {
          bgCtx.clearRect(0, 0, w, h);
        }

        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
        if (resizeSnapshotDraw) {
          ctx.drawImage(resizeSnapshotDraw, 0, 0, resizeSnapshotDraw.width, resizeSnapshotDraw.height, 0, 0, w, h);
        } else {
          ctx.clearRect(0, 0, w, h);
        }
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
      }

      function getPoint(ev) {
        var rect = canvas.getBoundingClientRect();
        var x, y;
        if (ev.touches && ev.touches.length) {
          x = ev.touches[0].clientX;
          y = ev.touches[0].clientY;
        } else {
          x = ev.clientX;
          y = ev.clientY;
        }
        var lw = frame.clientWidth;
        var lh = frame.clientHeight;
        return {
          x: (x - rect.left) * (lw / rect.width),
          y: (y - rect.top) * (lh / rect.height)
        };
      }

      var TAP_PX = 6;

      function hslHueToRgb(h) {
        h = ((Math.floor(h) % 360) + 360) % 360;
        var s = 1;
        var l = 0.5;
        var c = (1 - Math.abs(2 * l - 1)) * s;
        var hp = h / 60;
        var x = c * (1 - Math.abs((hp % 2) - 1));
        var r1;
        var g1;
        var b1;
        if (hp < 1) {
          r1 = c;
          g1 = x;
          b1 = 0;
        } else if (hp < 2) {
          r1 = x;
          g1 = c;
          b1 = 0;
        } else if (hp < 3) {
          r1 = 0;
          g1 = c;
          b1 = x;
        } else if (hp < 4) {
          r1 = 0;
          g1 = x;
          b1 = c;
        } else if (hp < 5) {
          r1 = x;
          g1 = 0;
          b1 = c;
        } else {
          r1 = c;
          g1 = 0;
          b1 = x;
        }
        var m = l - c / 2;
        return [Math.round((r1 + m) * 255), Math.round((g1 + m) * 255), Math.round((b1 + m) * 255)];
      }

      function hexToRgb(hex) {
        var h = hex.replace("#", "");
        return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
      }

      function floodFillAt(point) {
        var lw = frame.clientWidth;
        var lh = frame.clientHeight;
        var w = canvas.width;
        var h = canvas.height;
        if (lw < 1 || lh < 1 || w < 1 || h < 1) return;
        var ix = Math.max(0, Math.min(w - 1, Math.floor((point.x / lw) * w)));
        var iy = Math.max(0, Math.min(h - 1, Math.floor((point.y / lh) * h)));

        var compCv = document.createElement("canvas");
        compCv.width = w;
        compCv.height = h;
        var compCtx = compCv.getContext("2d");
        compCtx.drawImage(bgCanvas, 0, 0);
        compCtx.drawImage(canvas, 0, 0);
        var comp = compCtx.getImageData(0, 0, w, h);
        var cd = comp.data;

        var drawIm = ctx.getImageData(0, 0, w, h);
        var dd = drawIm.data;

        var si = (iy * w + ix) * 4;
        var sr = cd[si];
        var sg = cd[si + 1];
        var sb = cd[si + 2];
        var sa = cd[si + 3];

        var fr;
        var fg;
        var fb;
        var fa;
        if (fillEraser) {
          fr = 0;
          fg = 0;
          fb = 0;
          fa = 0;
        } else if (fillRainbow) {
          var rgb = hslHueToRgb(Date.now() / 18);
          fr = rgb[0];
          fg = rgb[1];
          fb = rgb[2];
          fa = 255;
        } else {
          var hx = hexToRgb(fillColor);
          fr = hx[0];
          fg = hx[1];
          fb = hx[2];
          fa = 255;
        }

        var tol = 38;
        var tolA = 48;
        function matchComp(i) {
          return (
            Math.abs(cd[i] - sr) <= tol &&
            Math.abs(cd[i + 1] - sg) <= tol &&
            Math.abs(cd[i + 2] - sb) <= tol &&
            Math.abs(cd[i + 3] - sa) <= tolA
          );
        }

        if (!fillEraser) {
          if (Math.abs(sr - fr) <= tol && Math.abs(sg - fg) <= tol && Math.abs(sb - fb) <= tol && Math.abs(sa - fa) <= tolA) {
            return;
          }
        }

        var maxPx = Math.min(w * h, 1800000);
        var visited = new Uint8Array(w * h);
        var stack = [ix, iy];
        var filled = 0;

        while (stack.length && filled < maxPx) {
          var cy = stack.pop();
          var cx = stack.pop();
          if (cx < 0 || cy < 0 || cx >= w || cy >= h) continue;
          var k = cy * w + cx;
          if (visited[k]) continue;
          var ci = k * 4;
          if (!matchComp(ci)) continue;
          visited[k] = 1;
          filled += 1;
          dd[ci] = fr;
          dd[ci + 1] = fg;
          dd[ci + 2] = fb;
          dd[ci + 3] = fa;
          stack.push(cx, cy - 1);
          stack.push(cx, cy + 1);
          stack.push(cx - 1, cy);
          stack.push(cx + 1, cy);
        }

        ctx.putImageData(drawIm, 0, 0);
      }

      function startDraw(ev) {
        if (ev.type === "touchstart") ev.preventDefault();
        if (activeStamp) {
          placeStamp(getPoint(ev));
          return;
        }
        drawing = true;
        last = getPoint(ev);
        tapMaybe = brushKind !== "spray";
        if (brushKind === "spray") {
          sprayAt(last);
          return;
        }
      }

      function moveDraw(ev) {
        if (!drawing) return;
        if (ev.type === "touchmove") ev.preventDefault();
        var p = getPoint(ev);
        var dx = p.x - last.x;
        var dy = p.y - last.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (tapMaybe && dist > TAP_PX) {
          tapMaybe = false;
          ctx.beginPath();
          applyStrokeStyle();
          ctx.moveTo(last.x, last.y);
          ctx.lineTo(p.x, p.y);
          ctx.stroke();
          last = p;
          return;
        }
        if (tapMaybe) return;
        if (brushKind === "spray") {
          var step = 4;
          var steps = Math.max(1, Math.floor(dist / step));
          for (var s = 1; s <= steps; s += 1) {
            sprayAt({
              x: last.x + (dx * s) / steps,
              y: last.y + (dy * s) / steps
            });
          }
          last = p;
          return;
        }
        if (brushKind === "brush") {
          var speed = Math.min(1, dist / 18);
          var width = lineW * (1.9 - speed * 0.9);
          ctx.save();
          ctx.globalCompositeOperation = "source-over";
          ctx.strokeStyle = rainbowInk ? "hsl(" + Math.floor(Date.now() / 18 % 360) + " 100% 50%)" : color;
          ctx.globalAlpha = 0.2;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.lineWidth = width * 1.38;
          ctx.beginPath();
          ctx.moveTo(last.x, last.y);
          ctx.lineTo(p.x, p.y);
          ctx.stroke();

          ctx.globalAlpha = 0.34;
          ctx.lineWidth = width;
          ctx.beginPath();
          ctx.moveTo(last.x, last.y);
          ctx.lineTo(p.x, p.y);
          ctx.stroke();

          ctx.globalAlpha = 0.46;
          ctx.lineWidth = width * 0.62;
          ctx.beginPath();
          ctx.moveTo(last.x, last.y);
          ctx.lineTo(p.x, p.y);
          ctx.stroke();
          ctx.restore();
          last = p;
          return;
        }
        if (brushKind === "chalk") {
          var jitter = Math.max(1.2, lineW * 0.08);
          for (var c = 0; c < 3; c += 1) {
            ctx.beginPath();
            applyStrokeStyle();
            ctx.moveTo(last.x + rand(-jitter, jitter), last.y + rand(-jitter, jitter));
            ctx.lineTo(p.x + rand(-jitter, jitter), p.y + rand(-jitter, jitter));
            ctx.stroke();
          }
          last = p;
          return;
        }
        ctx.beginPath();
        applyStrokeStyle();
        ctx.moveTo(last.x, last.y);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        last = p;
      }

      function endDraw(ev) {
        if (ev && ev.type === "touchend") ev.preventDefault();
        if (drawing && tapMaybe && brushKind !== "spray") {
          floodFillAt(last);
        } else if (drawing && tapMaybe) {
          ctx.beginPath();
          applyStrokeStyle();
          ctx.moveTo(last.x, last.y);
          ctx.lineTo(last.x + 0.05, last.y + 0.05);
          ctx.stroke();
        }
        tapMaybe = false;
        drawing = false;
        last = null;
        ctx.globalCompositeOperation = "source-over";
      }

      function placeStamp(point) {
        ctx.save();
        ctx.globalCompositeOperation = "source-over";
        ctx.font = "76px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(activeStamp, point.x, point.y);
        ctx.restore();
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);

      function pick(list) {

      function runYaminabe() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var blendModes = ["source-over", "lighter", "multiply", "screen", "overlay", "color-dodge", "hard-light"];
        var emojis = ["💥", "✨", "🌈", "⭐", "🔥", "🎉", "⚡", "🎨", "🌀", "🍭"];

        ctx.save();
        ctx.globalAlpha = 0.72;

        for (var i = 0; i < 180; i += 1) {
          ctx.globalCompositeOperation = pick(blendModes);
          ctx.strokeStyle = "hsl(" + Math.floor(rand(0, 360)) + " 98% 55%)";
          ctx.lineWidth = rand(3, 22);
          ctx.beginPath();
          var sx = rand(0, w);
          var sy = rand(0, h);
          for (var j = 0; j < 6; j += 1) {
            ctx.lineTo(rand(0, w), rand(0, h));
          }
          ctx.moveTo(sx, sy);
          ctx.stroke();
        }

        for (var k = 0; k < 75; k += 1) {
          ctx.globalCompositeOperation = pick(blendModes);
          ctx.fillStyle = "hsla(" + Math.floor(rand(0, 360)) + " 100% 52% / 0.7)";
          ctx.beginPath();
          ctx.arc(rand(0, w), rand(0, h), rand(12, 90), 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalCompositeOperation = "source-over";
        for (var m = 0; m < 85; m += 1) {
          ctx.font = Math.floor(rand(28, 110)) + "px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.shadowColor = "rgba(0,0,0,0.28)";
          ctx.shadowBlur = rand(3, 12);
          ctx.fillStyle = "hsl(" + Math.floor(rand(0, 360)) + " 100% 48%)";
          ctx.fillText(pick(emojis), rand(0, w), rand(0, h));

        ctx.restore();

        ctx.strokeRect(w * 0.55, h * 0.52, w * 0.35, h * 0.32);
        ctx.fillStyle = "#a1887f";
        ctx.fillRect(w * 0.12, h * 0.54, w * 0.31, h * 0.28);
        ctx.fillRect(w * 0.57, h * 0.54, w * 0.31, h * 0.28);
        ctx.restore();
      }

      function drawAquariumTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();
        ctx.save();
        var g = ctx.createLinearGradient(0, 0, 0, h);
        g.addColorStop(0, "#01579b");
        g.addColorStop(0.55, "#0277bd");
        g.addColorStop(1, "#01579b");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);
        var tunnel = ctx.createRadialGradient(w * 0.5, h * 0.42, 0, w * 0.5, h * 0.42, w * 0.65);
        tunnel.addColorStop(0, "rgba(128, 222, 234, 0.5)");
        tunnel.addColorStop(0.55, "rgba(3, 169, 244, 0.15)");
        tunnel.addColorStop(1, "rgba(1, 87, 155, 0)");
        ctx.fillStyle = tunnel;
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = "rgba(255,255,255,0.55)";
        ctx.lineWidth = Math.max(5, w * 0.018);
        for (var wi = 0; wi < 3; wi += 1) {
          ctx.beginPath();
          ctx.arc(w * (0.2 + wi * 0.3), h * 0.36, w * 0.12, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        for (var b = 0; b < 45; b += 1) {
          ctx.beginPath();
          ctx.arc(rand(0, w), rand(0, h), rand(2, 10), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawHospitalTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();
        ctx.save();
        var sky = ctx.createLinearGradient(0, 0, 0, h * 0.55);
        sky.addColorStop(0, "#b3e5fc");
        sky.addColorStop(1, "#e1f5fe");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, w, h * 0.55);
        ctx.fillStyle = "#eceff1";
        ctx.fillRect(0, h * 0.55, w, h * 0.45);
        ctx.fillStyle = "#fafafa";
        ctx.fillRect(w * 0.22, h * 0.22, w * 0.56, h * 0.48);
        ctx.fillStyle = "#ef5350";
        var cx = w * 0.5;
        var cy = h * 0.38;
        var cr = Math.min(w, h) * 0.06;
        ctx.fillRect(cx - cr * 0.22, cy - cr, cr * 0.44, cr * 2);
        ctx.fillRect(cx - cr, cy - cr * 0.22, cr * 2, cr * 0.44);
        ctx.strokeStyle = "#90a4ae";
        ctx.lineWidth = 3;
        for (var row = 0; row < 3; row += 1) {
          for (var col = 0; col < 4; col += 1) {
            ctx.strokeRect(w * (0.28 + col * 0.11), h * (0.28 + row * 0.1), w * 0.08, h * 0.07);
          }
        }
        ctx.strokeStyle = "#78909c";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(0, h * 0.7);
        ctx.lineTo(w, h * 0.7);
        ctx.stroke();
        ctx.restore();
      }

      function drawShoppingTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();
        ctx.save();
        ctx.fillStyle = "#ffe082";
        ctx.fillRect(0, 0, w, h * 0.42);
        ctx.fillStyle = "#cfd8dc";
        ctx.fillRect(0, h * 0.42, w, h * 0.58);
        var awningColors = ["#e53935", "#1e88e5", "#43a047", "#fb8c00", "#8e24aa", "#00acc1"];
        for (var s = 0; s < 6; s += 1) {
          var sx = w * (0.05 + s * 0.155);
          var sw = w * 0.14;
          ctx.fillStyle = "#eceff1";
          ctx.fillRect(sx, h * 0.38, sw, h * 0.38);
          ctx.fillStyle = awningColors[s % awningColors.length];
          ctx.beginPath();
          ctx.moveTo(sx - w * 0.01, h * 0.38);
          for (var z = 0; z <= 5; z += 1) {
            ctx.lineTo(sx + (z / 5) * sw, h * (z % 2 ? 0.33 : 0.38));
          }
          ctx.lineTo(sx + sw + w * 0.01, h * 0.38);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "#263238";
          ctx.fillRect(sx + sw * 0.2, h * 0.52, sw * 0.25, h * 0.2);
        }
        ctx.restore();
      }

      function drawSavannaTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();
        ctx.save();
        var sky = ctx.createLinearGradient(0, 0, 0, h * 0.62);
        sky.addColorStop(0, "#ffcc80");
        sky.addColorStop(0.55, "#ffb74d");
        sky.addColorStop(1, "#ff8f00");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, w, h * 0.62);
        ctx.fillStyle = "#ffeb3b";
        ctx.beginPath();
        ctx.arc(w * 0.78, h * 0.18, Math.min(w, h) * 0.09, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#c5a065";
        ctx.fillRect(0, h * 0.62, w, h * 0.38);
        ctx.strokeStyle = "#5d4037";
        ctx.lineWidth = 4;
        function acacia(ax, ay, sc) {
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.lineTo(ax, ay - h * 0.12 * sc);
          ctx.stroke();
          ctx.lineWidth = Math.max(18, w * 0.05 * sc);
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(ax - w * 0.1 * sc, ay - h * 0.11 * sc);
          ctx.lineTo(ax + w * 0.1 * sc, ay - h * 0.11 * sc);
          ctx.stroke();
          ctx.lineWidth = 4;
          ctx.lineCap = "butt";
        }
        acacia(w * 0.22, h * 0.72, 1.1);
        acacia(w * 0.55, h * 0.68, 0.85);
        acacia(w * 0.82, h * 0.75, 1);
        ctx.restore();
      }

      function drawSchoolTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();
        ctx.save();
        ctx.fillStyle = "#90caf9";
        ctx.fillRect(0, 0, w, h * 0.48);
        ctx.fillStyle = "#c8e6c9";
        ctx.fillRect(0, h * 0.48, w, h * 0.52);
        ctx.fillStyle = "#e57373";
        ctx.beginPath();
        ctx.moveTo(w * 0.18, h * 0.34);
        ctx.lineTo(w * 0.5, h * 0.2);
        ctx.lineTo(w * 0.82, h * 0.34);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#eceff1";
        ctx.fillRect(w * 0.2, h * 0.34, w * 0.6, h * 0.38);
        ctx.strokeStyle = "#78909c";
        ctx.lineWidth = 2;
        for (var sr = 0; sr < 2; sr += 1) {
          for (var sc = 0; sc < 6; sc += 1) {
            ctx.strokeRect(w * (0.24 + sc * 0.09), h * (0.4 + sr * 0.12), w * 0.06, h * 0.08);
          }
        }
        ctx.strokeStyle = "#5d4037";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(w * 0.5, h * 0.2);
        ctx.lineTo(w * 0.5, h * 0.12);
        ctx.stroke();
        ctx.fillStyle = "#e53935";
        ctx.beginPath();
        ctx.moveTo(w * 0.5, h * 0.12);
        ctx.lineTo(w * 0.54, h * 0.2);
        ctx.lineTo(w * 0.46, h * 0.2);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawMountainTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();
        ctx.save();
        var sky = ctx.createLinearGradient(0, 0, 0, h * 0.75);
        sky.addColorStop(0, "#e3f2fd");
        sky.addColorStop(1, "#bbdefb");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, w, h * 0.75);
        ctx.fillStyle = "#7cb342";
        ctx.fillRect(0, h * 0.75, w, h * 0.25);
        var layers = [
          { c: "#9fa8da", pts: [[0, 0.72], [0.22, 0.38], [0.42, 0.55], [0.62, 0.32], [0.82, 0.5], [1, 0.4], [1, 0.72]] },
          { c: "#7986cb", pts: [[0, 0.72], [0.15, 0.48], [0.38, 0.62], [0.55, 0.42], [0.75, 0.58], [1, 0.45], [1, 0.72]] },
          { c: "#5c6bc0", pts: [[0, 0.72], [0.28, 0.52], [0.5, 0.65], [0.72, 0.48], [1, 0.58], [1, 0.72]] }
        ];
        layers.forEach(function (layer) {
          ctx.fillStyle = layer.c;
          ctx.beginPath();
          ctx.moveTo(layer.pts[0][0] * w, layer.pts[0][1] * h);
          for (var p = 1; p < layer.pts.length; p += 1) {
            ctx.lineTo(layer.pts[p][0] * w, layer.pts[p][1] * h);
          }
          ctx.closePath();
          ctx.fill();
        });
        ctx.restore();
      }

      function drawBeachTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();
        ctx.save();
        var sky = ctx.createLinearGradient(0, 0, 0, h * 0.42);
        sky.addColorStop(0, "#4fc3f7");
        sky.addColorStop(1, "#b3e5fc");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, w, h * 0.42);
        ctx.fillStyle = "#ffeb3b";
        ctx.beginPath();
        ctx.arc(w * 0.2, h * 0.16, Math.min(w, h) * 0.07, 0, Math.PI * 2);
        ctx.fill();
        var sea = ctx.createLinearGradient(0, h * 0.38, 0, h * 0.62);
        sea.addColorStop(0, "#29b6f6");
        sea.addColorStop(1, "#0277bd");
        ctx.fillStyle = sea;
        ctx.fillRect(0, h * 0.38, w, h * 0.28);
        ctx.strokeStyle = "rgba(255,255,255,0.65)";
        ctx.lineWidth = 3;
        for (var ly = h * 0.44; ly < h * 0.62; ly += 16) {
          ctx.beginPath();
          ctx.moveTo(0, ly);
          for (var lx = 0; lx <= w; lx += 32) {
            ctx.quadraticCurveTo(lx + 10, ly - 5, lx + 16, ly);
          }
          ctx.stroke();
        }
        ctx.fillStyle = "#ffe082";
        ctx.fillRect(0, h * 0.62, w, h * 0.38);
        ctx.strokeStyle = "#d4a574";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, h * 0.62);
        for (var bx = 0; bx <= w; bx += 40) {
          ctx.quadraticCurveTo(bx + 14, h * 0.6 + rand(-4, 4), bx + 28, h * 0.62);
        }
        ctx.stroke();
        ctx.restore();
      }

      function closeAllPopups() {
        document.querySelectorAll(".popup.on").forEach(function (el) {
          el.classList.remove("on");
        });
      }

      function updateMenuLabels() {
        var btnColors = document.getElementById("btnColors");
        var btnFill = document.getElementById("btnFill");
        var btnSizes = document.getElementById("btnSizes");
        var btnTemplates = document.getElementById("btnTemplates");
        var btnStamps = document.getElementById("btnStamps");
        var sizeLabel = brushNames[brushKind] || "ペン";
        var templateLabel = activeTemplate ? (templateNames[activeTemplate] || activeTemplate) : "なし";
        var stampLabel = activeStamp || "なし";
        if (btnColors) {
          if (eraser) {
            btnColors.innerHTML = '🎨 せん: <span class="color-chip eraser" aria-hidden="true"></span>';
          } else if (rainbowInk) {
            btnColors.innerHTML = '🎨 せん: <span class="color-chip" aria-hidden="true" style="background:conic-gradient(#ff1744,#ff9100,#ffea00,#00e676,#00b0ff,#7c4dff,#ff1744)"></span>';
          } else {
            btnColors.innerHTML = '🎨 せん: <span class="color-chip" aria-hidden="true" style="background:' + color + '"></span>';
          }
          btnColors.setAttribute("aria-label", "せん");
        }
        if (btnFill) {
          if (fillEraser) {
            btnFill.innerHTML = '🪣 ぬる: <span class="color-chip eraser" aria-hidden="true"></span>';
          } else if (fillRainbow) {
            btnFill.innerHTML =
              '🪣 ぬる: <span class="color-chip" aria-hidden="true" style="background:conic-gradient(#ff1744,#ff9100,#ffea00,#00e676,#00b0ff,#7c4dff,#ff1744)"></span>';
          } else {
            btnFill.innerHTML = '🪣 ぬる: <span class="color-chip" aria-hidden="true" style="background:' + fillColor + '"></span>';
          }
          btnFill.setAttribute("aria-label", "ぬるいろ");
        }
        if (btnSizes) btnSizes.textContent = "🖌️ タッチ: " + sizeLabel;
        if (btnTemplates) btnTemplates.textContent = "🖼️ テンプレート: " + templateLabel;
        if (btnStamps) btnStamps.textContent = "✨ スタンプ: " + stampLabel;
        refreshCanvasCursor();
      }

      function cloneFillSwatches() {
        var mount = document.getElementById("fillSwatchMount");
        var src = document.querySelector("#popupColors .popup-body");
        if (!mount || !src) return;
        mount.innerHTML = "";
        src.querySelectorAll(".swatch").forEach(function (sw) {
          var cl = sw.cloneNode(true);
          cl.classList.remove("swatch");
          cl.classList.add("swatch-fill");
          mount.appendChild(cl);
        });
        mount.querySelectorAll(".swatch-fill").forEach(function (b) {
          b.addEventListener("click", function () {
            mount.querySelectorAll(".swatch-fill").forEach(function (s) {
              s.classList.remove("on");
            });
            b.classList.add("on");
            var c = b.getAttribute("data-c");
            if (c === "eraser") {
              fillEraser = true;
              fillRainbow = false;
            } else if (c === "rainbow") {
              fillEraser = false;
              fillRainbow = true;
            } else {
              fillEraser = false;
              fillRainbow = false;
              fillColor = c;
            }
            fillBucketCursor = true;
            updateMenuLabels();
            closeAllPopups();
          });
        });
      }

      function bindPopupControls() {
        document.querySelectorAll("[data-popup-open]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var id = btn.getAttribute("data-popup-open");
            var popup = document.getElementById(id);
            if (!popup) return;
            closeAllPopups();
            popup.classList.add("on");
          });
        });

        document.querySelectorAll("[data-popup-close]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            closeAllPopups();
          });
        });

        document.querySelectorAll(".popup").forEach(function (popup) {
          popup.addEventListener("click", function (ev) {
            if (ev.target === popup) closeAllPopups();
          });
        });

        document.addEventListener("keydown", function (ev) {
          if (ev.key === "Escape") closeAllPopups();
        });
      }

      document.querySelectorAll(".swatch").forEach(function (b) {
        b.addEventListener("click", function () {
          document.querySelectorAll(".swatch").forEach(function (s) {
            s.classList.remove("on");
          });
          b.classList.add("on");
          activeStamp = "";
          syncStampBtnHighlight();
          var c = b.getAttribute("data-c");
          fillBucketCursor = false;
          if (c === "eraser") {
            eraser = true;
            rainbowInk = false;
          } else if (c === "rainbow") {
            eraser = false;
            rainbowInk = true;
          } else {
            eraser = false;
            rainbowInk = false;
            color = c;
          }
          updateMenuLabels();
          closeAllPopups();
        });
      });

      document.querySelectorAll(".size-btn").forEach(function (b) {
        b.addEventListener("click", function () {
          document.querySelectorAll(".size-btn").forEach(function (s) {
            s.classList.remove("on");
          });
          b.classList.add("on");
          lineW = parseInt(b.getAttribute("data-w"), 10);
          brushKind = b.getAttribute("data-kind") || "pen";
          activeStamp = "";
          syncStampBtnHighlight();
          eraser = false;
          updateMenuLabels();
          closeAllPopups();
        });
      });

      document.getElementById("stampAccordion").addEventListener("click", function (ev) {
        var tabHit = ev.target.closest(".stamp-tab");
        if (tabHit) {
          var tid = tabHit.getAttribute("data-stamp-tab");
          if (tid) setStampTab(tid);
          return;
        }
        var b = ev.target.closest(".stamp-btn");
        if (!b) return;
        document.querySelectorAll(".stamp-btn").forEach(function (s) {
          s.classList.remove("on");
        });
        b.classList.add("on");
        activeStamp = b.getAttribute("data-stamp");
        eraser = false;
        updateMenuLabels();
        closeAllPopups();
      });

      document.getElementById("btnClear").addEventListener("click", function () {
        clearCanvasWhite();
      });

      document.getElementById("btnYaminabe").addEventListener("click", function () {
        runYaminabe();
      });

      document.querySelectorAll(".template-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var type = btn.getAttribute("data-template");
          activeTemplate = type || "";
          if (type === "road") drawRoadTemplate();
          if (type === "cake") drawCakeTemplate();
          if (type === "park") drawParkTemplate();
          if (type === "city") drawCityTemplate();
          if (type === "sea") drawSeaTemplate();
          if (type === "space") drawSpaceTemplate();
          if (type === "castle") drawCastleTemplate();
          if (type === "garden") drawGardenTemplate();
          if (type === "kouen") drawKouenTemplate();
          if (type === "zoo") drawZooTemplate();
          if (type === "aquarium") drawAquariumTemplate();
          if (type === "hospital") drawHospitalTemplate();
          if (type === "shopping") drawShoppingTemplate();
          if (type === "savanna") drawSavannaTemplate();
          if (type === "school") drawSchoolTemplate();
          if (type === "mountain") drawMountainTemplate();
          if (type === "beach") drawBeachTemplate();
          updateMenuLabels();
          closeAllPopups();
        });
      });

      canvas.addEventListener("mouseenter", refreshCanvasCursor);
      canvas.addEventListener("mousedown", startDraw);
      canvas.addEventListener("mousemove", moveDraw);
      canvas.addEventListener("mouseup", endDraw);
      canvas.addEventListener("mouseleave", endDraw);

      canvas.addEventListener("touchstart", startDraw, { passive: false });
      canvas.addEventListener("touchmove", moveDraw, { passive: false });
      canvas.addEventListener("touchend", endDraw);
      canvas.addEventListener("touchcancel", endDraw);

      if (typeof ResizeObserver !== "undefined") {
        var ro = new ResizeObserver(function () {
          syncSize();
        });
        ro.observe(frame);
      } else {
        window.addEventListener("resize", syncSize);
      }

      window.addEventListener("load", function () {
        renderStampAccordion();
        cloneFillSwatches();
        bindPopupControls();
        syncSize();
        updateMenuLabels();
      });
    })();
  </script>
</body>
</html>
