<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>おえかき ひろば</title>
  <style>
    :root {
      --bg1: #ffe0b2;
      --bg2: #ffcc80;
      --panel: rgba(255, 255, 255, 0.96);
      --ink: #263238;
      --shadow: rgba(38, 50, 56, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(160deg, var(--bg1) 0%, #fff9c4 40%, var(--bg2) 100%);
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    .header {
      flex-shrink: 0;
      padding: 0.35rem 0.55rem 0.22rem;
      text-align: center;
    }

    .top-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.2rem;
      padding: 0.28rem 0.72rem;
      font-size: clamp(0.75rem, 2.9vw, 0.9rem);
      font-weight: 800;
      color: #fff;
      text-decoration: none;
      text-shadow: 0 1px 2px var(--shadow);
      border-radius: 999px;
      background: rgba(230, 81,0, 0.55);
      border: 2px solid rgba(255, 255, 255, 0.65);
    }

    .top-back:active {
      opacity: 0.9;
      transform: scale(0.98);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.02rem, 4.2vw, 1.38rem);
      font-weight: 900;
      color: #e65100;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.9);
    }

    .hint {
      margin: 0.1rem 0 0;
      font-size: clamp(0.72rem, 2.6vw, 0.82rem);
      font-weight: 700;
      color: #5d4037;
    }

    .toolbar {
      flex-shrink: 0;
      margin: 0 0.45rem 0.3rem;
      padding: 0.42rem 0.4rem 0.45rem;
      background: var(--panel);
      border-radius: 1.1rem;
      box-shadow: 0 4px 18px var(--shadow);
      border: 3px solid #ffb74d;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
    }

    .menu-btn {
      min-height: 2.1rem;
      padding: 0 0.8rem;
      border: 3px solid #ffb74d;
      border-radius: 999px;
      background: #fff8e1;
      color: #5d4037;
      font-size: clamp(0.75rem, 2.8vw, 0.9rem);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 3px 0 #fb8c00;
    }

    .menu-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #fb8c00;
    }

    .popup {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      z-index: 30;
      background: rgba(20, 18, 16, 0.42);
    }

    .popup.on {
      display: flex;
    }

    .popup-card {
      width: min(840px, 96vw);
      max-width: 840px;
      min-width: min(320px, 96vw);
      max-height: 84dvh;
      background: #fffef8;
      border: 3px solid #ffb74d;
      border-radius: 1rem;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.26);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .popup-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
      padding: 0.5rem 0.7rem;
      background: #fff3e0;
      border-bottom: 2px solid #ffcc80;
    }

    .popup-title {
      margin: 0;
      font-size: clamp(0.82rem, 3vw, 1rem);
      color: #6d4c41;
      font-weight: 900;
    }

    .popup-close {
      min-height: 1.9rem;
      padding: 0 0.55rem;
      border-radius: 999px;
      border: 2px solid #ef9a9a;
      background: #ffcdd2;
      color: #b71c1c;
      font-weight: 900;
      cursor: pointer;
    }

    .popup-body {
      padding: 0.55rem;
      overflow: auto;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 0.45rem;
    }

    .swatch {
      width: 2.15rem;
      height: 2.15rem;
      border-radius: 50%;
      border: 4px solid rgba(0, 0, 0, 0.12);
      cursor: pointer;
      padding: 0;
      box-shadow: 0 3px 0 rgba(0, 0, 0, 0.15);
      transition: transform 0.1s ease;
    }

    .swatch:active {
      transform: scale(0.92);
    }

    .swatch.on {
      outline: 4px solid #ff6f00;
      outline-offset: 2px;
      transform: scale(1.08);
    }

    .swatch[data-c="eraser"] {
      background: linear-gradient(135deg, #eceff1 45%, #b0bec5 45%, #b0bec5 55%, #eceff1 55%);
    }

    .size-btn {
      min-height: 2.05rem;
      padding: 0 0.55rem;
      font-size: clamp(0.74rem, 2.8vw, 0.88rem);
      font-weight: 800;
      border: 3px solid #8d6e63;
      border-radius: 999px;
      background: #d7ccc8;
      color: #3e2723;
      cursor: pointer;
      box-shadow: 0 3px 0 #6d4c41;
    }

    .size-btn.on {
      background: #ffcc80;
      border-color: #ef6c00;
      color: #bf360c;
    }

    .size-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #6d4c41;
    }

    .action-btn {
      min-height: 2.15rem;
      padding: 0 0.62rem;
      font-size: clamp(0.74rem, 2.8vw, 0.88rem);
      font-weight: 800;
      border-radius: 999px;
      cursor: pointer;
      border: 3px solid;
    }

    .action-clear {
      background: #ffcdd2;
      border-color: #e57373;
      color: #b71c1c;
      box-shadow: 0 3px 0 #c62828;
    }

    .action-chaos {
      background: linear-gradient(135deg, #ff1744 0%, #ffea00 45%, #00e5ff 100%);
      border-color: #6a1b9a;
      color: #3e103f;
      box-shadow: 0 3px 0 #4a148c;
    }

    .action-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #666;
    }

    .canvas-shell {
      flex: 1;
      min-height: 0;
      margin: 0 0 0.35rem;
      display: flex;
      flex-direction: column;
    }

    .canvas-frame {
      flex: 1;
      min-height: 220px;
      background: #fff;
      border-radius: 1rem;
      box-shadow:
        inset 0 0 0 4px #ffe0b2,
        0 6px 24px var(--shadow);
      overflow: hidden;
      touch-action: none;
      position: relative;
    }

    #bgCanvas,
    #drawCanvas {
      display: block;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #drawCanvas {
      cursor: crosshair;
    }

    .stamp-btn {
      min-height: 2.05rem;
      padding: 0 0.5rem;
      border-radius: 999px;
      border: 3px solid #ffb74d;
      background: #fff8e1;
      color: #5d4037;
      font-size: clamp(0.82rem, 2.9vw, 0.98rem);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 3px 0 #ff9800;
    }

    .stamp-btn.on {
      background: #ffe082;
      border-color: #ef6c00;
      color: #bf360c;
      transform: scale(1.04);
    }

    .stamp-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #ff9800;
    }

    .stamp-accordion {
      width: 100%;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 0.28rem;
    }

    .template-btn {
      min-height: 2.05rem;
      padding: 0 0.56rem;
      border-radius: 999px;
      border: 3px solid #90caf9;
      background: #e3f2fd;
      color: #0d47a1;
      font-size: clamp(0.72rem, 2.7vw, 0.86rem);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 3px 0 #42a5f5;
    }

    .template-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #42a5f5;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.45rem;
      width: 100%;
    }
  </style>
</head>
<body>
  <header class="header">
    <a class="top-back" href="/">TOPへ もどる</a>
    <h1>おえかき ひろば</h1>
    <p class="hint">ゆびや マウスで なぞってね</p>
  </header>

  <div class="toolbar" role="toolbar" aria-label="どうぐ">
    <button type="button" class="menu-btn" data-popup-open="popupColors">いろ</button>
    <button type="button" class="menu-btn" data-popup-open="popupSizes">ふとさ</button>
    <button type="button" class="action-btn action-clear" id="btnClear">ぜんぶ けす</button>
    <button type="button" class="action-btn action-chaos" id="btnYaminabe">やみなべ</button>
    <button type="button" class="menu-btn" data-popup-open="popupTemplates">テンプレート</button>
    <button type="button" class="menu-btn" data-popup-open="popupStamps">スタンプ 200</button>
  </div>

  <div id="popupColors" class="popup" role="dialog" aria-label="いろ">
    <div class="popup-card">
      <div class="popup-head"><p class="popup-title">いろ</p><button type="button" class="popup-close" data-popup-close>とじる</button></div>
      <div class="popup-body">
        <button type="button" class="swatch on" data-c="#e53935" style="background:#e53935" title="あか" aria-label="あか"></button>
        <button type="button" class="swatch" data-c="#fb8c00" style="background:#fb8c00" title="オレンジ" aria-label="オレンジ"></button>
        <button type="button" class="swatch" data-c="#1e88e5" style="background:#1e88e5" title="あお" aria-label="あお"></button>
        <button type="button" class="swatch" data-c="#00acc1" style="background:#00acc1" title="みずいろ" aria-label="みずいろ"></button>
        <button type="button" class="swatch" data-c="#43a047" style="background:#43a047" title="みどり" aria-label="みどり"></button>
        <button type="button" class="swatch" data-c="#fdd835" style="background:#fdd835" title="きいろ" aria-label="きいろ"></button>
        <button type="button" class="swatch" data-c="#ffb6c1" style="background:#ffb6c1" title="ピンク" aria-label="ピンク"></button>
        <button type="button" class="swatch" data-c="#8e24aa" style="background:#8e24aa" title="むらさき" aria-label="むらさき"></button>
        <button type="button" class="swatch" data-c="#6d4c41" style="background:#6d4c41" title="ちゃいろ" aria-label="ちゃいろ"></button>
        <button type="button" class="swatch" data-c="#212121" style="background:#212121" title="くろ" aria-label="くろ"></button>
        <button type="button" class="swatch" data-c="eraser" title="けしゴム" aria-label="けしゴム"></button>
      </div>
    </div>
  </div>

  <div id="popupSizes" class="popup" role="dialog" aria-label="ふとさ">
    <div class="popup-card">
      <div class="popup-head"><p class="popup-title">ふとさ</p><button type="button" class="popup-close" data-popup-close>とじる</button></div>
      <div class="popup-body">
        <button type="button" class="size-btn" data-w="4">ちいさい</button>
        <button type="button" class="size-btn on" data-w="10">ふつう</button>
        <button type="button" class="size-btn" data-w="22">おおきい</button>
        <button type="button" class="size-btn" data-w="34">ごんぶと</button>
      </div>
    </div>
  </div>

  <div id="popupTemplates" class="popup" role="dialog" aria-label="テンプレート">
    <div class="popup-card">
      <div class="popup-head"><p class="popup-title">テンプレート</p><button type="button" class="popup-close" data-popup-close>とじる</button></div>
      <div class="popup-body template-grid">
        <button type="button" class="template-btn" data-template="road">どうろ</button>
        <button type="button" class="template-btn" data-template="cake">ケーキやさん</button>
        <button type="button" class="template-btn" data-template="park">ゆうえんち</button>
        <button type="button" class="template-btn" data-template="city">まちなみ</button>
        <button type="button" class="template-btn" data-template="sea">うみ</button>
        <button type="button" class="template-btn" data-template="space">うちゅう</button>
        <button type="button" class="template-btn" data-template="castle">おしろ</button>
        <button type="button" class="template-btn" data-template="garden">おはなばたけ</button>
      </div>
    </div>
  </div>

  <div id="popupStamps" class="popup" role="dialog" aria-label="スタンプ">
    <div class="popup-card">
      <div class="popup-head"><p class="popup-title">スタンプ（200しゅるい / いちらん）</p><button type="button" class="popup-close" data-popup-close>とじる</button></div>
      <div class="popup-body">
        <div id="stampAccordion" class="stamp-accordion"></div>
      </div>
    </div>
  </div>

  <div class="canvas-shell">
    <div class="canvas-frame">
      <canvas id="bgCanvas" width="600" height="480" aria-hidden="true"></canvas>
      <canvas id="drawCanvas" width="600" height="480" aria-label="えがきば"></canvas>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var bgCanvas = document.getElementById("bgCanvas");
      var bgCtx = bgCanvas.getContext("2d");
      var canvas = document.getElementById("drawCanvas");
      var ctx = canvas.getContext("2d");
      var frame = canvas.parentElement;

      var color = "#e53935";
      var lineW = 10;
      var drawing = false;
      var last = null;
      var eraser = false;
      var activeStamp = "";
      var lastFrameW = 0;
      var lastFrameH = 0;
      var STAMPS = [
        "🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵","🐔","🐧","🐦","🦆","🦉",
        "🦄","🐝","🦋","🐌","🐞","🐢","🐍","🦎","🦖","🦕","🐙","🦑","🦀","🐠","🐟","🐬","🐳","🦈","🐊","🦭",
        "🚗","🚕","🚙","🚌","🚎","🏎️","🚓","🚑","🚒","🚐","🚚","🚛","🚜","🚲","🛵","🏍️","🚄","🚅","✈️","🚀",
        "🍎","🍏","🍐","🍊","🍋","🍌","🍉","🍇","🍓","🫐","🍒","🍑","🥭","🍍","🥝","🍅","🥕","🌽","🍠","🥔",
        "🍞","🥐","🥨","🧀","🍖","🍗","🍤","🍣","🍙","🍛","🍜","🍝","🍕","🌭","🍔","🍟","🥪","🥟","🍰","🧁",
        "🌸","🌼","🌻","🌷","🌹","🪻","🌺","🌱","🌿","🍀","🍁","🍂","🌳","🌲","🌴","🌵","🌾","🌈","☀️","⛅",
        "🌤️","🌦️","🌧️","⛈️","🌩️","❄️","☃️","🌪️","🌫️","💧","💦","☔","⚡","🌙","⭐","✨","🪐","🌍","🌏","🌎",
        "⚽","🏀","🏈","⚾","🎾","🏐","🏉","🎱","🏓","🏸","🥅","🎯","🎮","🧩","🪀","🪁","🧸","🎨","🎭","🎪",
        "🏠","🏡","🏢","🏫","🏥","🏪","🏬","🏰","🗼","🗽","🎡","🎢","🎠","🎪","🛤️","🛣️","⛲","🌉","🏟️","🏖️",
        "💖","💗","💛","💚","💙","💜","🖤","🤍","🤎","❤️","🧡","💫","🌟","✨","🔥","💥","🎉","🎊","🎈","🎀"
      ];

      function applyStrokeStyle() {
        if (eraser) {
          ctx.globalCompositeOperation = "destination-out";
          ctx.strokeStyle = "rgba(0,0,0,1)";
          ctx.lineWidth = lineW * 1.85;
        } else {
          ctx.globalCompositeOperation = "source-over";
          ctx.strokeStyle = color;
          ctx.lineWidth = lineW;
        }
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
      }

      function syncSize() {
        var dpr = window.devicePixelRatio || 1;
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        if (w < 10 || h < 10) return;
        if (w === lastFrameW && h === lastFrameH && canvas.width > 0) return;
        lastFrameW = w;
        lastFrameH = h;
        bgCanvas.width = Math.floor(w * dpr);
        bgCanvas.height = Math.floor(h * dpr);
        bgCanvas.style.width = w + "px";
        bgCanvas.style.height = h + "px";
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";

        bgCtx.setTransform(1, 0, 0, 1, 0, 0);
        bgCtx.scale(dpr, dpr);
        bgCtx.clearRect(0, 0, w, h);
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, w, h);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
      }

      function getPoint(ev) {
        var rect = canvas.getBoundingClientRect();
        var x, y;
        if (ev.touches && ev.touches.length) {
          x = ev.touches[0].clientX;
          y = ev.touches[0].clientY;
        } else {
          x = ev.clientX;
          y = ev.clientY;
        }
        var lw = frame.clientWidth;
        var lh = frame.clientHeight;
        return {
          x: (x - rect.left) * (lw / rect.width),
          y: (y - rect.top) * (lh / rect.height)
        };
      }

      function startDraw(ev) {
        if (ev.type === "touchstart") ev.preventDefault();
        if (activeStamp) {
          placeStamp(getPoint(ev));
          return;
        }
        drawing = true;
        last = getPoint(ev);
        ctx.beginPath();
        applyStrokeStyle();
        ctx.moveTo(last.x, last.y);
        ctx.lineTo(last.x + 0.05, last.y + 0.05);
        ctx.stroke();
      }

      function moveDraw(ev) {
        if (!drawing) return;
        if (ev.type === "touchmove") ev.preventDefault();
        var p = getPoint(ev);
        ctx.beginPath();
        applyStrokeStyle();
        ctx.moveTo(last.x, last.y);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        last = p;
      }

      function endDraw(ev) {
        if (ev && ev.type === "touchend") ev.preventDefault();
        drawing = false;
        last = null;
        ctx.globalCompositeOperation = "source-over";
      }

      function placeStamp(point) {
        ctx.save();
        ctx.globalCompositeOperation = "source-over";
        ctx.font = "76px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(activeStamp, point.x, point.y);
        ctx.restore();
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function pick(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function runYaminabe() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var blendModes = ["source-over", "lighter", "multiply", "screen", "overlay", "color-dodge", "hard-light"];
        var emojis = ["💥", "✨", "🌈", "⭐", "🔥", "🎉", "⚡", "🎨", "🌀", "🍭"];

        ctx.save();
        ctx.globalAlpha = 0.72;

        for (var i = 0; i < 180; i += 1) {
          ctx.globalCompositeOperation = pick(blendModes);
          ctx.strokeStyle = "hsl(" + Math.floor(rand(0, 360)) + " 98% 55%)";
          ctx.lineWidth = rand(3, 22);
          ctx.beginPath();
          var sx = rand(0, w);
          var sy = rand(0, h);
          for (var j = 0; j < 6; j += 1) {
            ctx.lineTo(rand(0, w), rand(0, h));
          }
          ctx.moveTo(sx, sy);
          ctx.stroke();
        }

        for (var k = 0; k < 75; k += 1) {
          ctx.globalCompositeOperation = pick(blendModes);
          ctx.fillStyle = "hsla(" + Math.floor(rand(0, 360)) + " 100% 52% / 0.7)";
          ctx.beginPath();
          ctx.arc(rand(0, w), rand(0, h), rand(12, 90), 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalCompositeOperation = "source-over";
        for (var m = 0; m < 85; m += 1) {
          ctx.font = Math.floor(rand(28, 110)) + "px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.shadowColor = "rgba(0,0,0,0.28)";
          ctx.shadowBlur = rand(3, 12);
          ctx.fillStyle = "hsl(" + Math.floor(rand(0, 360)) + " 100% 48%)";
          ctx.fillText(pick(emojis), rand(0, w), rand(0, h));
        }

        ctx.restore();
      }

      function renderStampAccordion() {
        var root = document.getElementById("stampAccordion");
        var html = "";
        html += '<div class="stamp-group"><summary>スタンプ いちらん（' + STAMPS.length + '）</summary><div class="popup-body">';
        STAMPS.forEach(function (emj) {
          html += '<button type="button" class="stamp-btn" data-stamp="' + emj + '">' + emj + "</button>";
        });
        html += "</div></div>";

        root.innerHTML = html;
      }

      function clearCanvasWhite() {
        bgCtx.save();
        bgCtx.setTransform(1, 0, 0, 1, 0, 0);
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        bgCtx.restore();
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
        ctx.globalCompositeOperation = "source-over";
      }

      function drawRoadTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();

        ctx.save();
        var bg = ctx.createLinearGradient(0, 0, w, h);
        bg.addColorStop(0, "#e8f5e9");
        bg.addColorStop(1, "#dcedc8");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, w, h);

        ctx.strokeStyle = "#616161";
        ctx.lineWidth = 44;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(w * 0.08, h * 0.2);
        ctx.lineTo(w * 0.92, h * 0.2);
        ctx.moveTo(w * 0.08, h * 0.5);
        ctx.lineTo(w * 0.92, h * 0.5);
        ctx.moveTo(w * 0.08, h * 0.8);
        ctx.lineTo(w * 0.92, h * 0.8);
        ctx.moveTo(w * 0.2, h * 0.08);
        ctx.lineTo(w * 0.2, h * 0.92);
        ctx.moveTo(w * 0.5, h * 0.08);
        ctx.lineTo(w * 0.5, h * 0.92);
        ctx.moveTo(w * 0.8, h * 0.08);
        ctx.lineTo(w * 0.8, h * 0.92);
        ctx.stroke();

        ctx.strokeStyle = "#fffde7";
        ctx.lineWidth = 4;
        ctx.setLineDash([10, 12]);
        ctx.beginPath();
        ctx.moveTo(w * 0.08, h * 0.2);
        ctx.lineTo(w * 0.92, h * 0.2);
        ctx.moveTo(w * 0.08, h * 0.5);
        ctx.lineTo(w * 0.92, h * 0.5);
        ctx.moveTo(w * 0.08, h * 0.8);
        ctx.lineTo(w * 0.92, h * 0.8);
        ctx.moveTo(w * 0.2, h * 0.08);
        ctx.lineTo(w * 0.2, h * 0.92);
        ctx.moveTo(w * 0.5, h * 0.08);
        ctx.lineTo(w * 0.5, h * 0.92);
        ctx.moveTo(w * 0.8, h * 0.08);
        ctx.lineTo(w * 0.8, h * 0.92);
        ctx.stroke();
        ctx.setLineDash([]);
        for (var n = 0; n < 18; n += 1) {
          ctx.fillStyle = "hsl(" + Math.floor(rand(90, 140)) + " 48% 44%)";
          ctx.beginPath();
          ctx.arc(rand(0, w), rand(0, h), rand(6, 18), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawCakeTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();

        ctx.save();
        var sky = ctx.createLinearGradient(0, 0, 0, h);
        sky.addColorStop(0, "#fff3e0");
        sky.addColorStop(0.55, "#ffe0f0");
        sky.addColorStop(1, "#f8bbd0");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, w, h);

        ctx.strokeStyle = "#8d6e63";
        ctx.lineWidth = 12;
        ctx.strokeRect(w * 0.08, h * 0.08, w * 0.84, h * 0.84);

        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.moveTo(w * 0.12, h * 0.34);
        ctx.lineTo(w * 0.88, h * 0.34);
        ctx.moveTo(w * 0.12, h * 0.58);
        ctx.lineTo(w * 0.88, h * 0.58);
        ctx.moveTo(w * 0.12, h * 0.8);
        ctx.lineTo(w * 0.88, h * 0.8);
        ctx.stroke();

        ctx.strokeStyle = "#bcaaa4";
        ctx.lineWidth = 3;
        for (var i = 1; i <= 5; i += 1) {
          var x = w * (0.12 + i * 0.126);
          ctx.beginPath();
          ctx.moveTo(x, h * 0.1);
          ctx.lineTo(x, h * 0.9);
          ctx.stroke();
        }
        ctx.fillStyle = "rgba(255,255,255,0.45)";
        for (var d = 0; d < 20; d += 1) {
          ctx.beginPath();
          ctx.arc(rand(0, w), rand(0, h * 0.55), rand(8, 30), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawParkTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();

        ctx.save();
        var grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, "#81d4fa");
        grad.addColorStop(0.62, "#b3e5fc");
        grad.addColorStop(0.63, "#c8e6c9");
        grad.addColorStop(1, "#a5d6a7");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);

        ctx.strokeStyle = "#5d4037";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(w * 0.22, h * 0.64);
        ctx.lineTo(w * 0.22, h * 0.22);
        ctx.moveTo(w * 0.78, h * 0.64);
        ctx.lineTo(w * 0.78, h * 0.22);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(w * 0.5, h * 0.28, w * 0.22, Math.PI, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = "#ffca28";
        ctx.lineWidth = 4;
        for (var i = 0; i < 8; i += 1) {
          var sx = w * (0.26 + i * 0.065);
          ctx.beginPath();
          ctx.moveTo(sx, h * 0.65);
          ctx.lineTo(sx, h * 0.32);
          ctx.stroke();
        }

        ctx.strokeStyle = "#ef6c00";
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.moveTo(w * 0.12, h * 0.86);
        ctx.quadraticCurveTo(w * 0.5, h * 0.72, w * 0.88, h * 0.86);
        ctx.stroke();
        for (var p = 0; p < 6; p += 1) {
          var px = w * (0.12 + p * 0.14);
          ctx.fillStyle = "hsl(" + Math.floor(rand(0, 360)) + " 85% 62%)";
          ctx.beginPath();
          ctx.arc(px, h * 0.17, 12, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawCityTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();
        ctx.save();
        var sky = ctx.createLinearGradient(0, 0, 0, h);
        sky.addColorStop(0, "#90caf9");
        sky.addColorStop(0.6, "#bbdefb");
        sky.addColorStop(1, "#ffe082");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, w, h);
        for (var i = 0; i < 8; i += 1) {
          var bw = rand(w * 0.08, w * 0.16);
          var bh = rand(h * 0.2, h * 0.5);
          var bx = i * (w / 8) + rand(-8, 8);
          var by = h * 0.8 - bh;
          ctx.fillStyle = "hsl(" + Math.floor(rand(180, 260)) + " 20% 45%)";
          ctx.fillRect(bx, by, bw, bh);
          ctx.fillStyle = "rgba(255, 245, 157, 0.8)";
          for (var wx = bx + 8; wx < bx + bw - 6; wx += 12) {
            for (var wy = by + 8; wy < by + bh - 6; wy += 12) {
              if (Math.random() > 0.38) ctx.fillRect(wx, wy, 6, 8);
            }
          }
        }
        ctx.strokeStyle = "#5d4037";
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.moveTo(0, h * 0.82);
        ctx.lineTo(w, h * 0.82);
        ctx.stroke();
        ctx.restore();
      }

      function drawSeaTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();
        ctx.save();
        var grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, "#80deea");
        grad.addColorStop(0.52, "#4fc3f7");
        grad.addColorStop(1, "#0288d1");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        for (var b = 0; b < 55; b += 1) {
          ctx.beginPath();
          ctx.arc(rand(0, w), rand(h * 0.4, h), rand(3, 12), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.strokeStyle = "rgba(255,255,255,0.85)";
        ctx.lineWidth = 3;
        for (var y = h * 0.48; y < h; y += 24) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          for (var x2 = 0; x2 <= w; x2 += 28) {
            ctx.quadraticCurveTo(x2 + 8, y - 7, x2 + 14, y);
          }
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawSpaceTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();
        ctx.save();
        var grad = ctx.createLinearGradient(0, 0, w, h);
        grad.addColorStop(0, "#10002b");
        grad.addColorStop(0.5, "#3c096c");
        grad.addColorStop(1, "#240046");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        for (var s = 0; s < 160; s += 1) {
          ctx.fillStyle = "hsl(" + Math.floor(rand(40, 65)) + " 100% 85%)";
          ctx.beginPath();
          ctx.arc(rand(0, w), rand(0, h), rand(0.8, 2.6), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.strokeStyle = "#9d4edd";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(w * 0.75, h * 0.24, w * 0.12, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      function drawCastleTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();
        ctx.save();
        var grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, "#c5cae9");
        grad.addColorStop(0.65, "#e8eaf6");
        grad.addColorStop(1, "#c8e6c9");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "#b0bec5";
        ctx.fillRect(w * 0.3, h * 0.33, w * 0.4, h * 0.42);
        ctx.fillRect(w * 0.2, h * 0.25, w * 0.1, h * 0.5);
        ctx.fillRect(w * 0.7, h * 0.25, w * 0.1, h * 0.5);
        ctx.fillStyle = "#78909c";
        ctx.fillRect(w * 0.44, h * 0.52, w * 0.12, h * 0.23);
        ctx.fillStyle = "#ef5350";
        ctx.beginPath();
        ctx.moveTo(w * 0.25, h * 0.25);
        ctx.lineTo(w * 0.25, h * 0.17);
        ctx.lineTo(w * 0.36, h * 0.22);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(w * 0.75, h * 0.25);
        ctx.lineTo(w * 0.75, h * 0.17);
        ctx.lineTo(w * 0.64, h * 0.22);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawGardenTemplate() {
        var w = frame.clientWidth;
        var h = frame.clientHeight;
        var ctx = bgCtx;
        clearCanvasWhite();
        ctx.save();
        ctx.fillStyle = "#e3f2fd";
        ctx.fillRect(0, 0, w, h * 0.52);
        ctx.fillStyle = "#c8e6c9";
        ctx.fillRect(0, h * 0.52, w, h * 0.48);
        for (var g = 0; g < 36; g += 1) {
          var gx = rand(0, w);
          var gy = rand(h * 0.56, h * 0.95);
          ctx.fillStyle = "hsl(" + Math.floor(rand(0, 360)) + " 82% 62%)";
          ctx.beginPath();
          ctx.arc(gx, gy, 7, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#2e7d32";
          ctx.fillRect(gx - 1, gy + 6, 2, 10);
        }
        ctx.restore();
      }

      function closeAllPopups() {
        document.querySelectorAll(".popup.on").forEach(function (el) {
          el.classList.remove("on");
        });
      }

      function bindPopupControls() {
        document.querySelectorAll("[data-popup-open]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var id = btn.getAttribute("data-popup-open");
            var popup = document.getElementById(id);
            if (!popup) return;
            closeAllPopups();
            popup.classList.add("on");
          });
        });

        document.querySelectorAll("[data-popup-close]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            closeAllPopups();
          });
        });

        document.querySelectorAll(".popup").forEach(function (popup) {
          popup.addEventListener("click", function (ev) {
            if (ev.target === popup) closeAllPopups();
          });
        });

        document.addEventListener("keydown", function (ev) {
          if (ev.key === "Escape") closeAllPopups();
        });
      }

      document.querySelectorAll(".swatch").forEach(function (b) {
        b.addEventListener("click", function () {
          document.querySelectorAll(".swatch").forEach(function (s) {
            s.classList.remove("on");
          });
          b.classList.add("on");
          activeStamp = "";
          document.querySelectorAll(".stamp-btn").forEach(function (s) {
            s.classList.remove("on");
          });
          var c = b.getAttribute("data-c");
          if (c === "eraser") {
            eraser = true;
          } else {
            eraser = false;
            color = c;
          }
        });
      });

      document.querySelectorAll(".size-btn").forEach(function (b) {
        b.addEventListener("click", function () {
          document.querySelectorAll(".size-btn").forEach(function (s) {
            s.classList.remove("on");
          });
          b.classList.add("on");
          lineW = parseInt(b.getAttribute("data-w"), 10);
        });
      });

      document.getElementById("stampAccordion").addEventListener("click", function (ev) {
        var b = ev.target.closest(".stamp-btn");
        if (!b) return;
        document.querySelectorAll(".stamp-btn").forEach(function (s) {
          s.classList.remove("on");
        });
        b.classList.add("on");
        activeStamp = b.getAttribute("data-stamp");
        eraser = false;
      });

      document.getElementById("btnClear").addEventListener("click", function () {
        clearCanvasWhite();
      });

      document.getElementById("btnYaminabe").addEventListener("click", function () {
        runYaminabe();
      });

      document.querySelectorAll(".template-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var type = btn.getAttribute("data-template");
          if (type === "road") drawRoadTemplate();
          if (type === "cake") drawCakeTemplate();
          if (type === "park") drawParkTemplate();
          if (type === "city") drawCityTemplate();
          if (type === "sea") drawSeaTemplate();
          if (type === "space") drawSpaceTemplate();
          if (type === "castle") drawCastleTemplate();
          if (type === "garden") drawGardenTemplate();
        });
      });

      canvas.addEventListener("mousedown", startDraw);
      canvas.addEventListener("mousemove", moveDraw);
      canvas.addEventListener("mouseup", endDraw);
      canvas.addEventListener("mouseleave", endDraw);

      canvas.addEventListener("touchstart", startDraw, { passive: false });
      canvas.addEventListener("touchmove", moveDraw, { passive: false });
      canvas.addEventListener("touchend", endDraw);
      canvas.addEventListener("touchcancel", endDraw);

      if (typeof ResizeObserver !== "undefined") {
        var ro = new ResizeObserver(function () {
          syncSize();
        });
        ro.observe(frame);
      } else {
        window.addEventListener("resize", syncSize);
      }

      window.addEventListener("load", function () {
        renderStampAccordion();
        bindPopupControls();
        syncSize();
      });
    })();
  </script>
</body>
</html>
