<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>あそびを えらんでね</title>
  <style>
    :root {
      --sky-top: #87ceeb;
      --sky-bottom: #b8e8ff;
      --grass: #6bc96b;
      --shadow: rgba(45, 58, 45, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
      color: #263238;
    }

    body {
      min-height: 100dvh;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 38%, var(--grass) 38%, #4a9f4a 100%);
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 0.85rem 0.85rem 1.5rem;
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: clamp(1.35rem, 5.5vw, 1.9rem);
      font-weight: 900;
      text-align: center;
      color: #fff;
      text-shadow: 0 2px 6px var(--shadow);
    }

    .lead {
      margin: 0 0 1.1rem;
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      font-weight: 700;
      text-align: center;
      color: rgba(255, 255, 255, 0.95);
      text-shadow: 0 1px 3px var(--shadow);
    }

    .game-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .game-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 1.25rem;
      padding: 1.1rem 1.15rem 1.15rem;
      box-shadow: 0 6px 22px var(--shadow);
      border: 5px solid rgba(255, 193, 7, 0.85);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      min-height: 5.5rem;
    }

    .game-card:active {
      transform: scale(0.98);
    }

    .game-card--primary {
      border-color: #ff9800;
      background: linear-gradient(165deg, #fffde7 0%, #fff 45%);
      box-shadow:
        0 0 0 2px rgba(255, 152, 0, 0.35),
        0 8px 28px rgba(255, 152, 0, 0.25),
        0 6px 22px var(--shadow);
    }

    .game-card--soon {
      border-style: dashed;
      border-color: #90a4ae;
      background: rgba(255, 255, 255, 0.88);
      opacity: 0.92;
    }

    .game-card--play {
      border-color: #66bb6a;
      border-style: solid;
      background: linear-gradient(165deg, #e8f5e9 0%, #fff 48%);
      box-shadow:
        0 0 0 2px rgba(102, 187, 106, 0.35),
        0 6px 22px var(--shadow);
      opacity: 1;
    }

    .game-card__row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }

    .game-card__icon {
      font-size: clamp(1.85rem, 7vw, 2.5rem);
      line-height: 1;
      flex-shrink: 0;
    }

    .game-card__title {
      font-size: clamp(1.15rem, 4.5vw, 1.45rem);
      font-weight: 900;
      margin: 0 0 0.2rem;
      line-height: 1.25;
    }

    .game-card__desc {
      margin: 0;
      font-size: clamp(0.88rem, 3.2vw, 1.02rem);
      font-weight: 700;
      color: #546e7a;
      line-height: 1.4;
    }

    .badge {
      display: inline-block;
      margin-top: 0.45rem;
      padding: 0.25rem 0.55rem;
      font-size: clamp(0.78rem, 2.8vw, 0.88rem);
      font-weight: 800;
      border-radius: 999px;
      background: #eceff1;
      color: #546e7a;
    }

    .game-card--primary .badge {
      background: rgba(255, 193, 7, 0.35);
      color: #e65100;
    }

    @media (hover: hover) and (pointer: fine) {
      .game-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px var(--shadow);
      }
      .game-card--primary:hover {
        box-shadow:
          0 0 0 3px rgba(255, 152, 0, 0.45),
          0 14px 36px rgba(255, 152, 0, 0.3),
          0 8px 26px var(--shadow);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>あそびを えらんでね</h1>
    <p class="lead">やりたい ゲームを おしてね</p>

    <ul class="game-list">
      <li>
        <a class="game-card game-card--primary" href="seikatsu-manner-game.html">
          <div class="game-card__row">
            <span class="game-card__icon" aria-hidden="true">🏠</span>
            <div>
              <p class="game-card__title">せいかつマナー すごろく</p>
              <p class="game-card__desc">くいずに こたえると すすむよ</p>
              <span class="badge">あそべる</span>
            </div>
          </div>
        </a>
      </li>
      <li>
        <a class="game-card game-card--play" href="suuji-quiz-game.html">
          <div class="game-card__row">
            <span class="game-card__icon" aria-hidden="true">🔢</span>
            <div>
              <p class="game-card__title">すうじ クイズ</p>
              <p class="game-card__desc">たしざんや かずを たのしく まなぼう</p>
              <span class="badge">あそべる</span>
            </div>
          </div>
        </a>
      </li>
      <li>
        <a class="game-card game-card--play" href="moji-kotoba-game.html">
          <div class="game-card__row">
            <span class="game-card__icon" aria-hidden="true">🔤</span>
            <div>
              <p class="game-card__title">もじ・ことば あそび</p>
              <p class="game-card__desc">ひらがなや ことばの クイズ</p>
              <span class="badge">あそべる</span>
            </div>
          </div>
        </a>
      </li>
      <li>
        <a class="game-card game-card--play" href="oekaki-hiroba.html">
          <div class="game-card__row">
            <span class="game-card__icon" aria-hidden="true">🎨</span>
            <div>
              <p class="game-card__title">おえかき ひろば</p>
              <p class="game-card__desc">きみだけの えを かこう</p>
              <span class="badge">あそべる</span>
            </div>
          </div>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
