<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>じゅんびちゅう</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
    }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: linear-gradient(180deg, #b3e5fc 0%, #81c784 100%);
      color: #263238;
    }
    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 1.25rem;
      padding: 1.5rem 1.35rem;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
      border: 4px solid #90caf9;
    }
    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(1.3rem, 5vw, 1.65rem);
      font-weight: 900;
    }
    p {
      margin: 0 0 1.25rem;
      font-size: clamp(1rem, 3.8vw, 1.15rem);
      font-weight: 700;
      line-height: 1.55;
    }
    a {
      display: inline-block;
      min-height: 3rem;
      line-height: 3rem;
      padding: 0 1.5rem;
      font-size: clamp(1rem, 4vw, 1.15rem);
      font-weight: 800;
      text-decoration: none;
      color: #1b5e20;
      background: #a5d6a7;
      border: 4px solid #43a047;
      border-radius: 999px;
      box-shadow: 0 4px 0 #2e7d32;
    }
    a:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #2e7d32;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>じゅんびちゅう です</h1>
    <p>この ゲームは これから つくるよ。<br />いま は ほかの あそびを たのしんでね。</p>
    <a href="index.html">TOPへ もどる</a>
  </div>
</body>
</html>
