<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>すうじ クイズ</title>
  <link rel="stylesheet" href="quiz-common.css" />
  <style>
    :root {
      --sky-top: #90caf9;
      --sky-bottom: #bbdefb;
      --field: #a5d6a7;
      --field-dark: #66bb6a;
      --panel: rgba(255, 255, 255, 0.95);
      --text: #263238;
      --shadow: rgba(38, 50, 56, 0.14);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      background:
        radial-gradient(130% 80% at 50% -20%, rgba(255, 255, 255, 0.65) 0%, rgba(255, 255, 255, 0) 58%),
        linear-gradient(160deg, #0f1f4d 0%, #1f4b9f 34%, #26a8cc 58%, #27b07f 100%);
      background-size: 100% 100%, 180% 180%;
      animation:
        bgShift 14s ease-in-out infinite alternate,
        dayNightFilter 300s linear infinite;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    @keyframes bgShift {
      0% { background-position: 0 0, 0% 35%; }
      100% { background-position: 0 0, 100% 65%; }
    }

    @keyframes dayNightFilter {
      0%, 20% { filter: brightness(1) saturate(1); }
      45% { filter: brightness(0.88) saturate(1.05); }
      55% { filter: brightness(0.62) saturate(0.85); }
      80% { filter: brightness(0.88) saturate(1.02); }
      100% { filter: brightness(1) saturate(1); }
    }

    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 0.65rem 0.75rem 1rem;
      gap: 0.65rem;
    }

    .top-back {
      display: inline-flex;
      align-self: center;
      padding: 0.45rem 0.9rem;
      font-size: clamp(0.88rem, 3.2vw, 1rem);
      font-weight: 800;
      color: #fff;
      text-decoration: none;
      text-shadow: 0 1px 3px var(--shadow);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.25);
      border: 2px solid rgba(255, 255, 255, 0.55);
    }

    .top-back:active {
      opacity: 0.88;
      transform: scale(0.98);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 5vw, 1.75rem);
      text-align: center;
      color: #fff;
      text-shadow: 0 2px 6px var(--shadow);
      font-weight: 900;
    }

    .progress-strip {
      background: var(--panel);
      border-radius: 1rem;
      padding: 0.55rem 0.65rem 0.65rem;
      box-shadow: 0 4px 18px var(--shadow);
    }

    .progress-strip > p {
      margin: 0 0 0.35rem;
      font-size: clamp(0.82rem, 3vw, 0.98rem);
      font-weight: 700;
      text-align: center;
      color: #1565c0;
    }

    .stars {
      display: flex;
      justify-content: center;
      gap: 0.2rem;
      flex-wrap: wrap;
    }

    .star {
      font-size: clamp(0.95rem, 3.8vw, 1.2rem);
      opacity: 0.35;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .star.on {
      opacity: 1;
      transform: scale(1.15);
    }

    .quiz-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: var(--panel);
      border-radius: 1.25rem;
      padding: 1.1rem 0.95rem 1.15rem;
      box-shadow: 0 6px 22px var(--shadow);
      min-height: 10rem;
      border: 4px solid rgba(100, 181, 246, 0.75);
    }

    .question {
      font-size: clamp(1.55rem, 6.4vw, 2.45rem);
      font-weight: 800;
      line-height: 1.45;
      text-align: center;
      margin: 0 0 0.45rem;
      letter-spacing: 0.02em;
    }

    .progress-text {
      text-align: center;
      font-size: clamp(0.95rem, 3.5vw, 1.12rem);
      font-weight: 700;
      color: #1e88e5;
      margin: 0 0 0.55rem;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.95rem;
      margin-top: auto;
      padding-top: 0.35rem;
    }

    .choice-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 6.2rem;
      padding: 1rem 0.65rem;
      font-size: clamp(1.35rem, 5.2vw, 1.7rem);
      font-weight: 800;
      border: 7px solid var(--choice-border, #90a4ae);
      border-radius: 1.3rem;
      background: var(--choice-bg, #eceff1);
      color: var(--text);
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 7px 0 var(--choice-shadow, #78909c);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }

    .choices .choice-btn:nth-child(1) {
      --choice-bg: #ffcdd2;
      --choice-border: #e57373;
      --choice-shadow: #c62828;
    }

    .choices .choice-btn:nth-child(2) {
      --choice-bg: #fff9c4;
      --choice-border: #ffee58;
      --choice-shadow: #f9a825;
    }

    .choices .choice-btn:nth-child(3) {
      --choice-bg: #c8e6c9;
      --choice-border: #66bb6a;
      --choice-shadow: #2e7d32;
    }

    .choices .choice-btn:nth-child(4) {
      --choice-bg: #bbdefb;
      --choice-border: #42a5f5;
      --choice-shadow: #1565c0;
    }

    @media (hover: hover) and (pointer: fine) {
      .choice-btn:hover:not(:disabled) {
        transform: scale(1.04) translateY(-2px);
        filter: brightness(1.03);
      }
    }

    .choice-btn:active:not(:disabled) {
      transform: translateY(5px) scale(1.01);
      box-shadow: 0 2px 0 var(--choice-shadow, #78909c);
    }

    .choice-btn:disabled { opacity: 0.55; cursor: default; }

    .choice-btn.wrong-shake { animation: wrongShake 0.62s ease-in-out; }

    @keyframes wrongShake {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      15% { transform: translateX(-12px) rotate(-2deg); }
      30% { transform: translateX(10px) rotate(2deg); }
      45% { transform: translateX(-8px) rotate(-1deg); }
      60% { transform: translateX(6px) rotate(1deg); }
    }

    .finish-panel {
      text-align: center;
      background: linear-gradient(165deg, #e3f2fd 0%, #e8f5e9 100%);
      border: 6px solid #42a5f5;
      border-radius: 1.25rem;
      padding: 1.35rem 1rem;
      box-shadow: 0 8px 28px var(--shadow);
    }

    .finish-panel .big {
      font-size: clamp(2rem, 8.5vw, 3rem);
      font-weight: 900;
      margin: 0 0 0.5rem;
      color: #0d47a1;
    }

    .finish-msg {
      font-size: clamp(1.1rem, 4.2vw, 1.45rem);
      font-weight: 700;
      margin: 0 0 1rem;
      color: #2e7d32;
    }

    .restart-btn {
      min-height: 3.4rem;
      padding: 0 1.6rem;
      font-size: clamp(1.05rem, 4.2vw, 1.3rem);
      font-weight: 800;
      border: 4px solid #1565c0;
      border-radius: 999px;
      background: #90caf9;
      color: #0d47a1;
      cursor: pointer;
      box-shadow: 0 4px 0 #1565c0;
    }

    .restart-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #1565c0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.28);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    .overlay.show { opacity: 1; pointer-events: auto; }
    .overlay.ok {
      background: radial-gradient(circle at 50% 35%, rgba(227, 242, 253, 0.9), rgba(144, 202, 249, 0.4), rgba(0, 0, 0, 0.25));
    }
    .overlay.ng {
      background: radial-gradient(ellipse 100% 70% at 50% 100%, rgba(69, 90, 100, 0.55), rgba(0, 0, 0, 0.35));
    }

    .overlay-card {
      background: #fff;
      border-radius: 1.4rem;
      padding: 1.4rem 1.6rem;
      max-width: 90vw;
      text-align: center;
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.22);
      border: 5px solid #64b5f6;
    }

    .overlay.ng .overlay-card {
      border-color: #78909c;
      background: linear-gradient(180deg, #eceff1, #cfd8dc);
    }

    .overlay-card h2 {
      margin: 0 0 0.35rem;
      font-size: clamp(1.75rem, 7vw, 2.6rem);
      font-weight: 900;
    }

    .overlay.ok h2 { color: #0d47a1; }
    .overlay.ng h2 { color: #37474f; }

    .overlay-card p {
      margin: 0;
      font-size: clamp(1.05rem, 4vw, 1.35rem);
      font-weight: 700;
    }

    .buzzer {
      font-size: clamp(1.35rem, 5.5vw, 1.85rem);
      font-weight: 900;
      color: #455a64;
      margin-bottom: 0.35rem;
      letter-spacing: 0.1em;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="top-back" href="/">TOPへ もどる</a>
    <h1>すうじ クイズ</h1>

    <div class="progress-strip" id="progressStrip" aria-label="すすみかた">
      <p>ただしいと ⭐が かがやくよ</p>
      <div class="stars" id="stars"></div>
    </div>

    <section class="quiz-panel" id="quizPanel">
      <p class="question" id="questionText"></p>
      <p class="progress-text" id="progressText"></p>
      <div class="choices" id="choices"></div>
    </section>

    <section class="quiz-panel finish-panel hidden" id="finishPanel" aria-live="polite">
      <p class="big">おわった！🌟</p>
      <p class="finish-msg">すうじ はかせ だね！</p>
      <button type="button" class="restart-btn" id="restartBtn">もういちど あそぶ</button>
    </section>
  </div>

  <div class="overlay" id="overlay" aria-live="assertive">
    <div class="confetti-layer hidden" id="confettiLayer" aria-hidden="true"></div>
    <div class="overlay-card" id="overlayCard">
      <div class="sparkles hidden" id="sparklesLine" aria-hidden="true">やったね！<br />すごーい！</div>
      <h2 id="overlayTitle"></h2>
      <p class="buzzer hidden" id="buzzerLine">ぶぶーーーー</p>
      <p id="overlaySub"></p>
    </div>
  </div>

  <script src="quiz-effects.js"></script>
  <script>
    (function () {
      "use strict";

      var ROUNDS = 10;

      var POOL = [
        { q: "3 + 2 は いくつ？", choices: ["4", "5", "6", "7"], i: 1 },
        { q: "8 - 3 は いくつ？", choices: ["3", "4", "5", "6"], i: 2 },
        { q: "6 と 2 で おおきいのは？", choices: ["6", "2", "おなじ", "0"], i: 0 },
        { q: "4 + 4 は いくつ？", choices: ["6", "7", "8", "9"], i: 2 },
        { q: "9 - 5 は いくつ？", choices: ["3", "4", "5", "6"], i: 1 },
        { q: "1 から かぞえて 5ばんめの すうじは？", choices: ["3", "4", "5", "6"], i: 2 },
        { q: "7 + 1 は いくつ？", choices: ["6", "7", "8", "9"], i: 2 },
        { q: "10 - 2 は いくつ？", choices: ["6", "7", "8", "9"], i: 2 },
        { q: "2 + 6 は いくつ？", choices: ["6", "7", "8", "9"], i: 2 },
        { q: "5 - 4 は いくつ？", choices: ["1", "2", "3", "4"], i: 0 },
        { q: "3 と 9 で ちいさいのは？", choices: ["3", "9", "おなじ", "0"], i: 0 },
        { q: "0 + 7 は いくつ？", choices: ["0", "6", "7", "8"], i: 2 },
        { q: "6 - 1 は いくつ？", choices: ["4", "5", "6", "7"], i: 1 },
        { q: "2 + 2 は いくつ？", choices: ["2", "3", "4", "5"], i: 2 },
        { q: "9 - 1 は いくつ？", choices: ["7", "8", "9", "10"], i: 1 },
        { q: "4 と 4 は どっちが おおきい？", choices: ["ひだり", "みぎ", "おなじ", "わからない"], i: 2 },
        { q: "5 + 3 は いくつ？", choices: ["7", "8", "9", "10"], i: 1 },
        { q: "8 - 6 は いくつ？", choices: ["1", "2", "3", "4"], i: 1 },
        { q: "1 + 7 は いくつ？", choices: ["7", "8", "9", "10"], i: 1 },
        { q: "6 - 4 は いくつ？", choices: ["1", "2", "3", "4"], i: 1 },
        { q: "3 + 5 は いくつ？", choices: ["6", "7", "8", "9"], i: 2 },
        { q: "7 - 2 は いくつ？", choices: ["4", "5", "6", "7"], i: 1 },
        { q: "2 と 8 で おおきいのは？", choices: ["2", "8", "おなじ", "0"], i: 1 },
        { q: "10 から 1 ひくと？", choices: ["8", "9", "10", "11"], i: 1 },
        { q: "0 と 5 で ちいさいのは？", choices: ["0", "5", "おなじ", "1"], i: 0 },
        { q: "4 + 1 は いくつ？", choices: ["4", "5", "6", "7"], i: 1 },
        { q: "8 - 1 は いくつ？", choices: ["6", "7", "8", "9"], i: 1 },
        { q: "3 + 3 は いくつ？", choices: ["5", "6", "7", "8"], i: 1 },
        { q: "9 - 4 は いくつ？", choices: ["4", "5", "6", "7"], i: 1 },
        { q: "2 + 5 は いくつ？", choices: ["6", "7", "8", "9"], i: 1 },
        { q: "6 + 3 は いくつ？", choices: ["8", "9", "10", "11"], i: 1 },
        { q: "7 - 6 は いくつ？", choices: ["0", "1", "2", "3"], i: 1 },
        { q: "1 + 1 は いくつ？", choices: ["1", "2", "3", "4"], i: 1 },
        { q: "5 + 4 は いくつ？", choices: ["8", "9", "10", "11"], i: 1 },
        { q: "8 と 8 は どっちが おおきい？", choices: ["ひだり", "みぎ", "おなじ", "どちらも0"], i: 2 },
        { q: "10 と 7 で ちいさいのは？", choices: ["10", "7", "おなじ", "9"], i: 1 },
        { q: "6 + 0 は いくつ？", choices: ["5", "6", "7", "8"], i: 1 },
        { q: "4 - 2 は いくつ？", choices: ["1", "2", "3", "4"], i: 1 },
        { q: "9 + 0 は いくつ？", choices: ["8", "9", "10", "0"], i: 1 },
        { q: "3 - 1 は いくつ？", choices: ["1", "2", "3", "4"], i: 1 },
        { q: "2 + 7 は いくつ？", choices: ["8", "9", "10", "11"], i: 1 },
        { q: "5 - 2 は いくつ？", choices: ["2", "3", "4", "5"], i: 1 }
      ];

      var state = {
        round: [],
        idx: 0,
        okCount: 0,
        lock: false,
        ctx: null
      };

      var els = {
        stars: document.getElementById("stars"),
        quizPanel: document.getElementById("quizPanel"),
        finishPanel: document.getElementById("finishPanel"),
        questionText: document.getElementById("questionText"),
        progressText: document.getElementById("progressText"),
        choices: document.getElementById("choices"),
        restartBtn: document.getElementById("restartBtn"),
        overlay: document.getElementById("overlay"),
        overlayCard: document.getElementById("overlayCard"),
        overlayTitle: document.getElementById("overlayTitle"),
        overlaySub: document.getElementById("overlaySub"),
        buzzerLine: document.getElementById("buzzerLine"),
        sparklesLine: document.getElementById("sparklesLine"),
        confettiLayer: document.getElementById("confettiLayer")
      };

      function shufflePick() {
        var ix = [];
        for (var i = 0; i < POOL.length; i++) ix.push(i);
        for (var j = ix.length - 1; j > 0; j--) {
          var r = Math.floor(Math.random() * (j + 1));
          var t = ix[j];
          ix[j] = ix[r];
          ix[r] = t;
        }
        var out = [];
        for (var k = 0; k < ROUNDS; k++) out.push(POOL[ix[k]]);
        return out;
      }

      function pinpon() {
        window.KidsQuizEffects.playPinpon(state);
      }

      function bubuu() {
        window.KidsQuizEffects.playBubuu(state);
      }

      function buildStars() {
        els.stars.innerHTML = "";
        for (var s = 0; s < ROUNDS; s++) {
          var sp = document.createElement("span");
          sp.className = "star";
          sp.textContent = "⭐";
          sp.setAttribute("aria-hidden", "true");
          els.stars.appendChild(sp);
        }
      }

      function updateStars() {
        var nodes = els.stars.querySelectorAll(".star");
        for (var i = 0; i < nodes.length; i++) {
          nodes[i].classList.toggle("on", i < state.okCount);
        }
      }

      function showOverlay(ok, title, sub, ms, done) {
        window.KidsQuizEffects.showOverlay({
          overlay: els.overlay,
          titleEl: els.overlayTitle,
          subEl: els.overlaySub,
          buzzerEl: els.buzzerLine,
          ok: ok,
          title: title,
          sub: sub,
          durationMs: ms,
          beforeShow: function (isOk) {
            if (!els.overlayCard) return;
            els.overlayCard.classList.toggle("correct-burst", isOk);
            if (els.sparklesLine) els.sparklesLine.classList.toggle("hidden", !isOk);
            if (isOk && els.confettiLayer) {
              window.KidsQuizEffects.burstConfetti(els.confettiLayer, 28);
            }
          },
          afterHide: function () {
            if (!els.overlayCard) return;
            els.overlayCard.classList.remove("correct-burst");
            if (els.sparklesLine) els.sparklesLine.classList.add("hidden");
            if (els.confettiLayer) {
              els.confettiLayer.classList.add("hidden");
              els.confettiLayer.innerHTML = "";
            }
          },
          onDone: done
        });
      }

      function renderQ() {
        var q = state.round[state.idx];
        els.questionText.textContent = q.q;
        els.progressText.textContent = "もんだい " + (state.idx + 1) + " / " + ROUNDS;
        els.choices.innerHTML = "";
        state.lock = false;
        for (var c = 0; c < q.choices.length; c++) {
          (function (n) {
            var b = document.createElement("button");
            b.type = "button";
            b.className = "choice-btn";
            b.textContent = q.choices[n];
            b.setAttribute("aria-label", q.choices[n]);
            bindChoiceAction(b, function () { pick(n, b); });
            els.choices.appendChild(b);
          })(c);
        }
      }

      function bindChoiceAction(btn, onPick) {
        var handledByTouch = false;
        btn.addEventListener("touchend", function (ev) {
          handledByTouch = true;
          ev.preventDefault();
          onPick();
          window.setTimeout(function () {
            handledByTouch = false;
          }, 400);
        }, { passive: false });
        btn.addEventListener("click", function () {
          if (handledByTouch) return;
          onPick();
        });
      }

      function setDisabled(disabled) {
        var bs = els.choices.querySelectorAll(".choice-btn");
        for (var i = 0; i < bs.length; i++) bs[i].disabled = disabled;
      }

      function pick(n, btn) {
        if (state.lock) return;
        var q = state.round[state.idx];
        var ok = n === q.i;
        state.lock = true;
        setDisabled(true);
        if (ok) {
          pinpon();
          showOverlay(true, "せいかい！", "そのちょうし！", 1650, function () {
            state.okCount++;
            updateStars();
            state.idx++;
            if (state.idx >= ROUNDS) {
              els.quizPanel.classList.add("hidden");
              els.finishPanel.classList.remove("hidden");
            } else {
              setDisabled(false);
              state.lock = false;
              renderQ();
            }
          });
        } else {
          bubuu();
          btn.classList.add("wrong-shake");
          window.setTimeout(function () {
            btn.classList.remove("wrong-shake");
          }, 650);
          showOverlay(false, "ざんねん！", "もういちど えらんでね", 1680, function () {
            setDisabled(false);
            state.lock = false;
          });
        }
      }

      function start() {
        state.round = shufflePick();
        state.idx = 0;
        state.okCount = 0;
        state.lock = false;
        buildStars();
        updateStars();
        els.finishPanel.classList.add("hidden");
        els.quizPanel.classList.remove("hidden");
        renderQ();
      }

      els.restartBtn.addEventListener("click", start);
      start();
    })();
  </script>
</body>
</html>
